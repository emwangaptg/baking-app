            const filteredOrders = useMemo(() => {
                let result = safeOrders;
                if (searchTerm) {
                    const lowerTerm = searchTerm.toLowerCase();
                    result = safeOrders.filter(o => {
                        if (!o) return false;
                        const cust = String(o.customer || '').toLowerCase();
                        const date = String(o.date || '');
                        const store = String(o.store || '').toLowerCase();
                        return cust.includes(lowerTerm) || date.includes(lowerTerm) || store.includes(lowerTerm);
                    });
                }
                return result.sort((a, b) => {
                    const dateDiff = new Date(b.date || 0) - new Date(a.date || 0);
                    if (dateDiff !== 0) return dateDiff;
                    return String(b.id).localeCompare(String(a.id));
                });
            }, [safeOrders, searchTerm]);

            const customerAnalysis = useMemo(() => {
                const customers = {};
                safeOrders.forEach(order => {
                    if (!order || typeof order !== 'object') return;
                    if (order.status !== 'completed') return;

                    const custName = order.customer ? String(order.customer).trim() : '未知客戶';
                    const storeName = order.store ? String(order.store).trim() : '無門市';
                    const key = `${custName}_${storeName}`;
                    
                    if (!customers[key]) {
                        customers[key] = { id: key, name: custName, store: storeName, totalSpend: 0, orderCount: 0, lastOrderDate: order.date || '', productCounts: {} };
                    }
                    
                    const cust = customers[key];
                    const amt = parseFloat(order.totalAmount);
                    cust.totalSpend += isNaN(amt) ? 0 : amt;
                    cust.orderCount += 1;
                    
                    if (order.date) {
                        if (!cust.lastOrderDate || new Date(order.date) > new Date(cust.lastOrderDate)) {
                            cust.lastOrderDate = order.date;
                        }
                    }

                    if (Array.isArray(order.items)) {
                        order.items.forEach(item => {
                            if (!item) return;
                            let pName = '未知商品';
                            const r = safeRecipes.find(rec => rec.id === item.recipeId);
                            if (r && r.name) pName = r.name;
                            else if (item.recipeName) pName = item.recipeName;
                            
                            if (!cust.productCounts[pName]) cust.productCounts[pName] = 0;
                            const qty = parseFloat(item.qty);
                            cust.productCounts[pName] += isNaN(qty) ? 0 : qty;
                        });
                    }
                });

                return Object.values(customers).map(c => {
                    const topProducts = Object.entries(c.productCounts)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 3)
                        .map(([name, qty]) => ({ name, qty }));

                    let tag = '🌱 新客';
                    let tagColorClass = 'bg-gray-500';
                    if (c.orderCount >= 5) { tag = '👑 VIP'; tagColorClass = 'bg-yellow-500'; }
                    else if (c.orderCount >= 2) { tag = '❤️ 回購客'; tagColorClass = 'bg-pink-500'; }

                    return { ...c, avgOrderValue: c.orderCount > 0 ? Math.round(c.totalSpend / c.orderCount) : 0, topProducts, tag, tagColorClass };
                })
                .sort((a, b) => {
                    if (b.orderCount !== a.orderCount) {
                        return b.orderCount - a.orderCount;
                    }
                    return b.totalSpend - a.totalSpend;
                });
            }, [safeOrders, safeRecipes]);

            const handleAddItem = () => { 
                if (safeRecipes.length === 0) return alert('請先建立食譜'); 
                setNewOrder({...newOrder, items: [...(newOrder.items||[]), { recipeId: safeRecipes[0].id, qty: 1, price: safeRecipes[0].sellingPrice }]}); 
            };
            
            const calculateTotal = (order) => { 
                if (!order || !Array.isArray(order.items)) return 0;
                const itemsTotal = order.items.reduce((acc, item) => {
                    const price = parseFloat(item.price) || 0;
                    const qty = parseFloat(item.qty) || 0;
                    return acc + (price * qty);
                }, 0); 
                const ship = parseFloat(order.shippingFee) || 0;
                const pkg = parseFloat(order.packagingFee) || 0;
                return itemsTotal + ship + pkg;
            };
            
            const openEditModal = (order) => { setEditingId(order.id); setNewOrder(order); setIsCreating(true); };
            
            const submitOrder = () => { 
                if (!newOrder.customer) return alert('請輸入客戶名稱'); 
                if (!newOrder.items || newOrder.items.length === 0) return alert('請加入商品'); 
                const finalOrder = { ...newOrder, totalAmount: calculateTotal(newOrder) };
                if (!editingId) { finalOrder.date = new Date().toISOString().split('T')[0]; finalOrder.status = 'pending'; }
                if (editingId && newOrder.status) finalOrder.status = newOrder.status;
                onSave(finalOrder, editingId); closeModal();
            };
            
            const closeModal = () => { setIsCreating(false); setEditingId(null); setNewOrder({ customer: '', store: '', shippingFee: 0, packagingFee: 0, items: [], note: '' }); };
            const handleImportClick = () => fileInputRef.current.click();
            
            const handleForceComplete = (order) => {
                if(!confirm("這將會把訂單設為「已完成」，但【不會】再次扣除庫存。\n\n適用於：匯入舊資料、或已經手動扣過庫存的訂單。\n\n確定嗎？")) return;
                onSave({ ...order, status: 'completed' }, order.id);
            };

            const handleFileUpload = async (e) => { 
                const file = e.target.files[0]; if (!file) return; 
                try { 
                    if (!window.XLSX) await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"); 
                    const reader = new FileReader(); 
                    reader.onload = (evt) => { 
                        const data = new Uint8Array(evt.target.result); 
                        const workbook = window.XLSX.read(data, { type: 'array', cellDates: true }); 
                        const jsonData = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); 
                        processExcelData(jsonData); 
                    }; 
                    reader.readAsArrayBuffer(file); 
                } catch (error) { console.error(error); alert("匯入失敗: " + error.message); } e.target.value = ''; 
            };
            
            const processExcelData = (rows) => {
                const groupedOrders = {};
                const findKey = (row, keywords) => { 
                    const keys = Object.keys(row); 
                    for (const kw of keywords) { 
                        if (row[kw] !== undefined) return row[kw]; 
                        const foundKey = keys.find(k => k.replace(/\s/g, '').includes(kw.replace(/\s/g, ''))); 
                        if (foundKey) return row[foundKey]; 
                    } 
                    return undefined; 
                };

                const parseExcelDate = (val) => {
                    if (!val) return new Date().toISOString().split('T')[0];
                    let dateObj = null;
                    if (val instanceof Date) { dateObj = val; } 
                    else if (typeof val === 'string') { dateObj = new Date(val); } 
                    else if (typeof val === 'number') { dateObj = new Date(Math.round((val - 25569) * 86400 * 1000)); }
                    if (!dateObj || isNaN(dateObj.getTime())) return new Date().toISOString().split('T')[0];
                    const offset = dateObj.getTimezoneOffset() * 60000;
                    const localDate = new Date(dateObj.getTime() - offset);
                    return localDate.toISOString().split('T')[0];
                };

                rows.forEach(row => {
                    const rawDate = findKey(row, ['訂購日期', '日期']);
                    const date = parseExcelDate(rawDate);
                    const customer = String(findKey(row, ['收件人姓名', '收件人', '客戶名稱']) || '未知客戶').trim();
                    const store = String(findKey(row, ['取貨門市', '門市', '取貨地址']) || '').trim(); 
                    const productName = findKey(row, ['商品名稱', '品名', '品名/規格']);
                    const price = parseFloat(findKey(row, ['價格', '單價']) || 0);
                    const qty = parseInt(findKey(row, ['數量']) || 1);
                    const shipping = parseFloat(findKey(row, ['運費', '運費(B)']) || 0);
                    
                    let recipeId = `UNKNOWN_${productName || 'unknown'}`;
                    let finalPrice = price;
                    
                    if (safeRecipes.length > 0 && productName) {
                        const recipe = safeRecipes.find(r => r.name.trim() === String(productName).trim());
                        if (recipe) {
                            recipeId = recipe.id;
                            if (finalPrice === 0) finalPrice = recipe.sellingPrice;
                        }
                    }

                    const key = `${date}_${customer}`;
                    if (!groupedOrders[key]) { 
                        groupedOrders[key] = { date, customer, store, shippingFee: shipping, packagingFee: 0, status: 'pending', items: [], totalAmount: 0 }; 
                    } else {
                        if (!groupedOrders[key].store && store) { groupedOrders[key].store = store; }
                        if (shipping > groupedOrders[key].shippingFee) { groupedOrders[key].shippingFee = shipping; }
                    }
                    
                    if (productName) { groupedOrders[key].items.push({ recipeId, recipeName: productName, qty, price: finalPrice }); }
                });
                
                const parsedList = Object.values(groupedOrders).map(order => { 
                    order.totalAmount = calculateTotal(order); 
                    const hasUnknown = order.items.some(i => i.recipeId && i.recipeId.startsWith('UNKNOWN')); 
                    if (hasUnknown) { order.note = "⚠️ 注意：包含未知商品"; order.hasError = true; } 
                    return order; 
                });
                
                if (parsedList.length > 0) { setPreviewOrders(parsedList); setShowImportPreview(true); } 
                else { alert("檔案中沒有有效的訂單資料。"); }
            };
            
            const confirmImport = () => { 
                let importCount = 0; 
                previewOrders.forEach(order => { const { hasError, ...cleanOrder } = order; onSave(cleanOrder); importCount++; }); 
                alert(`成功匯入 ${importCount} 筆訂單！`); setShowImportPreview(false); setPreviewOrders([]); 
            };

            if (showImportPreview) { return (<Modal title="匯入預覽" onClose={() => setShowImportPreview(false)}><div className="space-y-4">{previewOrders.map((order, idx) => (<div key={idx} className={`bg-white rounded-lg p-4 shadow-sm border-l-4 ${order.hasError ? 'border-red-500' : 'border-green-500'}`}><div className="flex justify-between"><div className="font-bold">{order.customer} <span className="text-xs text-gray-400 font-normal">{order.date}</span></div><div className="font-bold text-indigo-600">${order.totalAmount}</div></div><div className="text-sm mt-2">{order.items.map((i, k) => <div key={k}>{i.recipeName} x{i.qty}</div>)}</div>{order.store && <div className="text-xs text-gray-500 mt-1 flex items-center"><Store size={10} className="mr-1"/>{order.store}</div>}</div>))}</div><div className="pt-4 flex justify-end space-x-3"><button onClick={() => setShowImportPreview(false)} className="px-6 py-2 bg-gray-100 rounded-lg">取消</button><button onClick={confirmImport} className="px-6 py-2 bg-indigo-600 text-white rounded-lg">確認匯入</button></div></Modal>); }
            
            if (isCreating) {
                return (
                    <Modal title={editingId ? "編輯訂單" : "建立新訂單"} onClose={closeModal}>
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm font-bold text-gray-700">客戶姓名</label><input className="w-full border p-2 rounded mt-1" value={newOrder.customer} onChange={e => setNewOrder({...newOrder, customer: e.target.value})} /></div><div><label className="block text-sm font-bold text-gray-700">取貨門市</label><input className="w-full border p-2 rounded mt-1" value={newOrder.store} onChange={e => setNewOrder({...newOrder, store: e.target.value})} /></div></div>
                            <div>
                                <div className="flex justify-between items-center mb-2"><label className="block text-sm font-bold text-gray-700">訂購商品</label><button onClick={handleAddItem} className="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded">+ 加入商品</button></div>
                                {newOrder.items && newOrder.items.map((item, idx) => (
                                    <div key={idx} className="flex space-x-2 mb-2 items-center">
                                            <select className="flex-1 border p-2 rounded" value={item.recipeId} onChange={e => { const r = safeRecipes.find(rec => rec.id === e.target.value); const newItems = [...newOrder.items]; newItems[idx].recipeId = e.target.value; newItems[idx].price = r ? r.sellingPrice : 0; setNewOrder({...newOrder, items: newItems}); }}>{safeRecipes.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}</select>
                                            <input type="number" className="w-16 border p-2 rounded text-center" value={item.qty} onChange={v => { const newItems = [...newOrder.items]; newItems[idx].qty = parseInt(v.target.value) || 1; setNewOrder({...newOrder, items: newItems}); }} placeholder="量"/>
                                            <button onClick={() => { const newItems = newOrder.items.filter((_, i) => i !== idx); setNewOrder({...newOrder, items: newItems}); }} className="text-red-400"><Trash2 size={18} /></button>
                                    </div>
                                ))}
                            </div>
                            <div className="grid grid-cols-2 gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <div><label className="block text-sm font-bold text-gray-700">運費 (向客人收)</label><SafeNumberInput className="w-full border p-2 rounded mt-1" value={newOrder.shippingFee} onChange={v => setNewOrder({...newOrder, shippingFee: parseFloat(v) || 0})} /></div>
                                <div><label className="block text-sm font-bold text-indigo-700">加收包材費 (向客人收)</label><SafeNumberInput className="w-full border p-2 rounded mt-1 text-indigo-700 font-bold" value={newOrder.packagingFee} onChange={v => setNewOrder({...newOrder, packagingFee: parseFloat(v) || 0})} placeholder="0"/><p className="text-[10px] text-gray-400 mt-1">*此金額會加總至總金額</p></div>
                            </div>
                            <div className="text-right font-bold text-lg mt-4 text-indigo-600 bg-gray-50 p-2 rounded">總金額: ${calculateTotal(newOrder)}</div>
                            <div className="flex justify-end space-x-3 border-t pt-4 mt-4"><button onClick={closeModal} className="px-6 py-2 bg-gray-200 rounded-lg font-bold text-gray-600">取消</button><button onClick={submitOrder} className="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold shadow-lg hover:bg-indigo-700">儲存訂單</button></div>
                        </div>
                    </Modal>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-center space-y-2 md:space-y-0">
                        <div className="flex items-center space-x-4">
                            <h2 className="text-2xl font-bold text-gray-800">訂單管理</h2>
                            <div className="bg-gray-100 p-1 rounded-lg flex space-x-1">
                                <button onClick={() => setActiveView('list')} className={`px-3 py-1.5 rounded-md text-sm font-bold transition-all flex items-center ${activeView === 'list' ? 'bg-white text-indigo-600 shadow' : 'text-gray-500 hover:text-gray-700'}`}><ClipboardList size={16} className="mr-1"/> 訂單列表</button>
                                <button onClick={() => setActiveView('crm')} className={`px-3 py-1.5 rounded-md text-sm font-bold transition-all flex items-center ${activeView === 'crm' ? 'bg-purple-600 text-white shadow' : 'text-gray-500 hover:text-gray-700'}`}><Users size={16} className="mr-1"/> 客戶分析 (CRM)</button>
                            </div>
                        </div>
                        {activeView === 'list' && (
                            <div className="flex space-x-2">
                                <div className="relative"><Search className="absolute left-3 top-2.5 text-gray-400" size={16} /><input type="text" placeholder="搜尋..." className="pl-9 pr-3 py-2 border rounded-lg text-sm w-48 focus:ring-2 focus:ring-indigo-500 focus:outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                                <button onClick={handleImportClick} className="bg-green-600 text-white px-3 py-2 rounded-lg flex items-center shadow hover:bg-green-700 whitespace-nowrap"><Upload size={18} className="mr-1 hidden md:block" /> 匯入</button>
                                <button onClick={() => { setEditingId(null); setNewOrder({ customer: '', store: '', shippingFee: 0, packagingFee: 0, items: [], note: '' }); setIsCreating(true); }} className="bg-indigo-600 text-white px-3 py-2 rounded-lg flex items-center shadow hover:bg-indigo-700 whitespace-nowrap"><Plus size={18} className="mr-1 hidden md:block" /> 新增</button>
                            </div>
                        )}
                    </div>

                    {activeView === 'list' && (
                        <div className="grid grid-cols-1 gap-4">
                            {filteredOrders.length === 0 && <p className="text-center text-gray-400 py-10">{searchTerm ? '找不到符合的訂單' : '尚無訂單'}</p>}
                            {filteredOrders.map(order => {
                                const { cost, profit } = calculateOrderFinancials(order, recipes, ingredients, packaging);
                                const profitMargin = order.totalAmount > 0 ? (profit / order.totalAmount) * 100 : 0;

                                return (
                                <div key={order.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start hover:border-indigo-200 transition-colors">
                                    <div className="w-full md:w-3/4">
                                        <div className="flex items-center space-x-2 flex-wrap mb-3">
                                            <span className="font-bold text-lg text-gray-800">{order.customer}</span>
                                            <Badge color={order.status === 'completed' ? 'green' : 'yellow'}>{order.status === 'completed' ? '已完成' : '待處理'}</Badge>
                                            <span className="text-xs text-gray-400 flex items-center"><Calendar size={12} className="mr-1"/>{order.date}</span>
                                            {order.store && <span className="text-xs text-gray-500 flex items-center bg-gray-100 px-2 py-0.5 rounded"><Store size={10} className="mr-1"/>{order.store}</span>}
                                        </div>
                                        <div className="bg-gray-50 rounded-lg p-3 text-sm space-y-2 border border-gray-100">
                                            {(order.items && order.items.length > 0) ? order.items.map((item, idx) => { 
                                                let rName = '(已刪除的食譜)';
                                                if (safeRecipes && Array.isArray(safeRecipes)) { const r = safeRecipes.find(rec => rec.id === item.recipeId); if (r) rName = r.name; else if (item.recipeName) rName = item.recipeName; } else if (item.recipeName) { rName = item.recipeName; }
                                                const isUnknown = rName === '(已刪除的食譜)'; 
                                                return (<div key={idx} className={`flex justify-between items-center ${isUnknown ? 'text-red-400' : 'text-gray-700'}`}><div className="flex items-center"><div className={`w-1 h-1 rounded-full mr-2 ${isUnknown ? 'bg-red-400' : 'bg-gray-400'}`}></div><span className="font-medium">{rName}</span><span className="text-gray-400 mx-2">x</span><span className="font-bold">{item.qty}</span></div><span className="text-gray-500">${(item.price * item.qty).toLocaleString()}</span></div>); 
                                            }) : <div className="text-gray-400 text-center py-2">無商品資料</div>}
                                            <div className="border-t border-gray-200 pt-2 space-y-1"><div className="flex justify-between items-center text-gray-500 text-xs"><span>運費</span><span>${order.shippingFee || 0}</span></div>{order.packagingFee > 0 && (<div className="flex justify-between items-center text-indigo-500 text-xs"><span>包材費</span><span>+${order.packagingFee}</span></div>)}</div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col items-end space-y-2 w-full md:w-auto mt-4 md:mt-0 pl-4 md:border-l border-gray-100 h-full justify-center">
                                        <div className="text-xs text-gray-400">總金額</div>
                                        <div className="font-bold text-indigo-600 text-2xl">${order.totalAmount ? order.totalAmount.toLocaleString() : 0}</div>
                                        
                                        <div className="text-xs text-right w-full mb-2 bg-slate-50 p-2 rounded">
                                            <div className="text-gray-400 mb-1">成本: ${Math.round(cost).toLocaleString()}</div>
                                            <div className={profit >= 0 ? "text-green-600 font-bold" : "text-red-500 font-bold"}>
                                                淨利: ${Math.round(profit).toLocaleString()} <span className="text-[10px] opacity-70">({profitMargin.toFixed(0)}%)</span>
                                            </div>
                                        </div>

                                        {order.status === 'pending' && (
                                            <div className="w-full space-y-2 mb-2">
                                                <button onClick={() => onUpdateStatus(order, 'completed')} className="w-full bg-green-600 text-white px-4 py-2 rounded-lg flex items-center shadow-sm text-sm hover:bg-green-700 justify-center"><CheckCircle size={16} className="mr-1" /> 完成並扣庫存</button>
                                                <button onClick={() => handleForceComplete(order)} className="w-full bg-gray-100 text-gray-600 px-4 py-2 rounded-lg flex items-center shadow-sm text-xs hover:bg-gray-200 justify-center border border-gray-200"><FileText size={14} className="mr-1" /> 補登 (不扣庫存)</button>
                                            </div>
                                        )}
                                        <div className="flex space-x-2 w-full">
                                            <button onClick={() => openEditModal(order)} className="flex-1 bg-indigo-50 text-indigo-600 py-1.5 rounded-lg text-sm hover:bg-indigo-100 flex items-center justify-center font-medium shadow-sm border border-indigo-100"><Edit3 size={16} className="mr-1"/> 修改</button>
                                            <button onClick={() => onDelete(order.id)} className="flex-1 bg-white border border-red-200 text-red-500 py-1.5 rounded-lg text-sm hover:bg-red-50 flex items-center justify-center font-medium shadow-sm"><Trash2 size={16} className="mr-1"/> 刪除</button>
                                        </div>
                                    </div>
                                </div>
                            )})}
                        </div>
                    )}

                    {activeView === 'crm' && (
                        <div className="space-y-4">
                            <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 text-purple-800 text-sm flex items-center"><Heart className="mr-2 text-purple-600" size={20}/> <span>客戶分析統計範圍：<strong>僅限「已完成 (Completed)」的訂單</strong>。</span></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {customerAnalysis.map((cust) => (
                                    <Card key={cust.id} className="p-4 hover:shadow-md transition-shadow relative overflow-hidden">
                                            <div className={`absolute top-0 right-0 p-1.5 rounded-bl-xl text-xs font-bold text-white ${cust.tagColorClass}`}>{cust.tag}</div>
                                            <div className="flex items-center mb-3"><div className={`w-12 h-12 rounded-full flex items-center justify-center text-xl font-bold mr-3 ${cust.tag === '👑 VIP' ? 'bg-yellow-100 text-yellow-600' : 'bg-gray-100 text-gray-500'}`}>{cust.name.charAt(0)}</div><div><h3 className="font-bold text-lg text-gray-800">{cust.name}</h3><p className="text-xs text-gray-500 flex items-center"><Store size={10} className="mr-1"/> {cust.store}</p></div></div>
                                            <div className="grid grid-cols-3 gap-2 text-center bg-gray-50 p-2 rounded-lg mb-3"><div><p className="text-[10px] text-gray-400">總消費</p><p className="font-bold text-indigo-600">${cust.totalSpend.toLocaleString()}</p></div><div><p className="text-[10px] text-gray-400">訂購次數</p><p className="font-bold text-gray-700">{cust.orderCount} 次</p></div><div><p className="text-[10px] text-gray-400">客單價</p><p className="font-bold text-gray-700">${cust.avgOrderValue}</p></div></div>
                                            <div><p className="text-xs font-bold text-gray-500 mb-1 flex items-center"><Heart size={10} className="mr-1"/> 購買喜好 (Top 3)</p><div className="space-y-1">{cust.topProducts.map((p, i) => (<div key={i} className="flex justify-between text-sm items-center"><span className="truncate flex-1 text-gray-700">{p.name}</span><span className="text-xs bg-indigo-50 text-indigo-600 px-1.5 rounded-full">x{p.qty}</span></div>))}</div></div>
                                            <div className="mt-3 pt-2 border-t border-gray-100 text-[10px] text-gray-400 text-right">最後訂購日: {cust.lastOrderDate}</div>
                                    </Card>
                                ))}
                                {customerAnalysis.length === 0 && <div className="col-span-full text-center py-10 text-gray-400">尚無已完成的訂單資料</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- StallManager ---
        const StallManager = ({ stalls, recipes, ingredients, packaging, onSave, onDelete, onDeductStock }) => {
            const [editingId, setEditingId] = useState(null);
            const [stallForm, setStallForm] = useState({ name: '', location: '', startDate: '', endDate: '', boothFee: 0, miscFee: 0, products: [], gifts: [], status: 'pending' });

            const safeStallsList = (Array.isArray(stalls) ? stalls : [])
                .filter(s => s !== null && s !== undefined)
                .sort((a, b) => {
                    const dateA = new Date(a.startDate || a.date || 0).getTime();
                    const dateB = new Date(b.startDate || b.date || 0).getTime();
                    return dateB - dateA;
                });

            const getDetailedCost = (recipeId) => {
                const r = recipes.find(rc => rc.id === recipeId);
                if (!r) return { ingCostPerPortion: 0, pkgCostPerPortion: 0, totalPerPortion: 0, yieldCount: 1 };
                
                let ingCostBatch = 0;
                let pkgCostBatch = 0;
                
                (r.items || []).forEach(item => {
                    const ing = ingredients.find(i => i.id === item.id) || ingredients.find(i => i.name === item.name);
                    if (ing) { ingCostBatch += (ing.cost || 0) * item.qty; }
                });

                (r.packagingItems || []).forEach(item => {
                    const pkg = packaging.find(p => p.id === item.id) || packaging.find(p => p.name === item.name);
                    if (pkg) { pkgCostBatch += (pkg.cost || 0) * item.qty; }
                });

                const yieldCount = parseFloat(r.yieldCount) || 1;
                
                return {
                    ingCostPerPortion: ingCostBatch / yieldCount,
                    pkgCostPerPortion: pkgCostBatch / yieldCount,
                    totalPerPortion: (ingCostBatch + pkgCostBatch) / yieldCount,
                    yieldCount: yieldCount
                };
            };

            const startEdit = (stall) => {
                try {
                    setEditingId(stall.id);
                    let form = JSON.parse(JSON.stringify(stall));
                    if (!form.startDate) form.startDate = form.date || '';
                    if (!form.endDate) form.endDate = form.date || '';
                    if (!form.miscFee) form.miscFee = 0;
                    
                    form.products = (form.products || []).map(p => ({ 
                        ...p, 
                        unit: p.unit || 'portion', 
                        discount: p.discount || 0 
                    }));
                    
                    form.gifts = (form.gifts || []).map(g => ({ 
                        ...g, 
                        note: g.note || ''
                    }));
                    
                    setStallForm(form);
                } catch (e) {
                    console.error("編輯載入失敗", e);
                    alert("載入資料時發生錯誤，請稍後再試。");
                }
            };

            const startNew = () => {
                setEditingId('new');
                setStallForm({ 
                    name: '', location: '', 
                    startDate: new Date().toISOString().split('T')[0], 
                    endDate: new Date().toISOString().split('T')[0], 
                    boothFee: 0, miscFee: 0, 
                    products: [], gifts: [], 
                    status: 'pending' 
                });
            };

            const calculateDynamicStats = (form) => {
                let estRevenue = 0;
                let estTotalCost = 0; 
                let totalIngCost = 0;
                let totalPkgCost = 0;

                (form.products || []).forEach(p => {
                    const rowRevenue = ((p.soldQty || 0) * (p.price || 0)) - (p.discount || 0);
                    estRevenue += rowRevenue;

                    const breakdown = getDetailedCost(p.recipeId);
                    const totalQty = (p.soldQty || 0) + (p.wasteQty || 0) + (p.tastingQty || 0);
                    
                    const thisIngCost = totalQty * breakdown.ingCostPerPortion;
                    const thisPkgCost = totalQty * breakdown.pkgCostPerPortion;
                    
                    totalIngCost += thisIngCost;
                    totalPkgCost += thisPkgCost;
                    estTotalCost += (thisIngCost + thisPkgCost);
                });

                (form.gifts || []).forEach(g => {
                     const breakdown = getDetailedCost(g.recipeId);
                     const thisIngCost = (g.qty || 0) * breakdown.ingCostPerPortion;
                     const thisPkgCost = (g.qty || 0) * breakdown.pkgCostPerPortion;
                     totalIngCost += thisIngCost;
                     totalPkgCost += thisPkgCost;
                     estTotalCost += (thisIngCost + thisPkgCost);
                });

                const fixedFee = (parseFloat(form.boothFee) || 0) + (parseFloat(form.miscFee) || 0);
                estTotalCost += fixedFee;

                return { revenue: estRevenue, totalCost: estTotalCost, netProfit: estRevenue - estTotalCost, totalIngCost, totalPkgCost, fixedFee };
            };

            const save = () => {
                if (!stallForm.name) return alert('請輸入活動名稱');
                const stats = calculateDynamicStats(stallForm);
                onSave({ ...stallForm, totalRevenue: stats.revenue, totalCost: stats.totalCost }, editingId === 'new' ? null : editingId);
                setEditingId(null);
            };

            const addProduct = () => {
                const r = recipes[0];
                if (!r) return alert('請先建立食譜');
                setStallForm({
                    ...stallForm,
                    products: [...stallForm.products, { recipeId: r.id, price: r.sellingPrice, prepareQty: 0, soldQty: 0, wasteQty: 0, tastingQty: 0, unit: 'portion', discount: 0 }]
                });
            };

            const addGift = () => {
                const r = recipes[0];
                if (!r) return alert('請先建立食譜');
                setStallForm({
                    ...stallForm,
                    gifts: [...stallForm.gifts, { recipeId: r.id, qty: 1, note: '' }]
                });
            };

            if (editingId) {
                const stats = calculateDynamicStats(stallForm);

                return (
                    <Modal title={editingId === 'new' ? '新增擺攤' : '編輯擺攤'} onClose={() => setEditingId(null)}>
                        <div className="space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="text-xs text-gray-500">活動名稱</label><input className="w-full border p-2 rounded" value={stallForm.name} onChange={e => setStallForm({ ...stallForm, name: e.target.value })} /></div>
                                <div><label className="text-xs text-gray-500">地點</label><input className="w-full border p-2 rounded" value={stallForm.location} onChange={e => setStallForm({ ...stallForm, location: e.target.value })} /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 bg-gray-50 p-2 rounded">
                                <div><label className="text-xs text-gray-500">開始日期</label><input type="date" className="w-full border p-2 rounded" value={stallForm.startDate} onChange={e => setStallForm({ ...stallForm, startDate: e.target.value })} /></div>
                                <div><label className="text-xs text-gray-500">結束日期</label><input type="date" className="w-full border p-2 rounded" value={stallForm.endDate} onChange={e => setStallForm({ ...stallForm, endDate: e.target.value })} /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 bg-red-50 p-2 rounded border border-red-100">
                                <div><label className="text-xs text-red-700 font-bold">攤位費</label><SafeNumberInput className="w-full border p-2 rounded" value={stallForm.boothFee} onChange={v => setStallForm({ ...stallForm, boothFee: v })} /></div>
                                <div><label className="text-xs text-red-700 font-bold">雜支/其他費用</label><SafeNumberInput className="w-full border p-2 rounded" value={stallForm.miscFee} onChange={v => setStallForm({ ...stallForm, miscFee: v })} /></div>
                            </div>
                            
                            <div className="bg-white border rounded-xl overflow-hidden">
                                <div className="bg-indigo-50 p-3 border-b flex justify-between items-center">
                                    <h4 className="font-bold text-indigo-800">販售商品 (有營收)</h4>
                                    <button onClick={addProduct} className="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded shadow">+ 加入商品</button>
                                </div>
                                <div className="p-3 space-y-4 max-h-80 overflow-y-auto custom-scrollbar bg-gray-100">
                                    {stallForm.products.map((prod, idx) => {
                                        const costDetail = getDetailedCost(prod.recipeId);
                                        const subtotal = (prod.soldQty || 0) * (prod.price || 0);
                                        const rowNet = subtotal - (prod.discount || 0);

                                        return (
                                        <div key={idx} className="flex flex-col bg-white p-3 rounded-lg border shadow-sm relative gap-3">
                                            <button 
                                                onClick={() => { const n = stallForm.products.filter((_, i) => i !== idx); setStallForm({ ...stallForm, products: n }) }} 
                                                className="absolute top-2 right-2 flex items-center bg-red-50 text-red-500 hover:bg-red-100 px-2 py-1 rounded text-xs font-bold border border-red-100 z-10"
                                            >
                                                <Trash2 size={14} className="mr-1"/> 移除
                                            </button>

                                            <div className="flex justify-between items-center pr-16">
                                                <select className="flex-1 border p-1.5 rounded text-sm mr-2 font-bold text-gray-700" value={prod.recipeId} onChange={e => {
                                                    const n = [...stallForm.products];
                                                    const r = recipes.find(x => x.id === e.target.value);
                                                    n[idx] = { ...n[idx], recipeId: e.target.value, price: r ? r.sellingPrice : 0 };
                                                    setStallForm({ ...stallForm, products: n });
                                                }}>
                                                    {(recipes||[]).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                                </select>
                                                <select className="w-20 border p-1.5 rounded text-sm bg-gray-50" value={prod.unit} onChange={e => {
                                                    const n = [...stallForm.products];
                                                    n[idx].unit = e.target.value;
                                                    setStallForm({ ...stallForm, products: n });
                                                }}>
                                                    <option value="portion">份/個</option>
                                                    <option value="g">克(g)</option>
                                                </select>
                                            </div>
                                            
                                            <div className="text-[10px] text-gray-500 bg-indigo-50 p-1.5 rounded flex justify-between px-2">
                                                <span>單份成本: <b>${(costDetail.totalPerPortion || 0).toFixed(1)}</b></span>
                                                <span className="text-gray-400">(食材${(costDetail.ingCostPerPortion || 0).toFixed(1)} / 包材${(costDetail.pkgCostPerPortion || 0).toFixed(1)})</span>
                                            </div>

                                            <div className="grid grid-cols-4 gap-2 text-center">
                                                <div><label className="text-[10px] text-gray-400 block">單價</label><input type="number" className="w-full border p-1 rounded text-sm text-center" value={prod.price} onChange={e => { const n = [...stallForm.products]; n[idx].price = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} /></div>
                                                <div><label className="text-[10px] text-gray-400 block">準備量</label><input type="number" className="w-full border p-1 rounded text-sm text-center" value={prod.prepareQty} onChange={e => { const n = [...stallForm.products]; n[idx].prepareQty = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} /></div>
                                                <div><label className="text-[10px] text-gray-400 block font-bold text-green-600">售出</label><input type="number" className="w-full border p-1 rounded text-sm text-center font-bold text-green-600 bg-green-50" value={prod.soldQty} onChange={e => { const n = [...stallForm.products]; n[idx].soldQty = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} /></div>
                                                <div className="flex gap-1">
                                                    <div><label className="text-[10px] text-gray-400 block">耗損</label><input type="number" className="w-full border p-1 rounded text-sm text-center text-red-500" value={prod.wasteQty || 0} onChange={e => { const n = [...stallForm.products]; n[idx].wasteQty = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} /></div>
                                                    <div><label className="text-[10px] text-gray-400 block">試吃</label><input type="number" className="w-full border p-1 rounded text-sm text-center text-orange-500" value={prod.tastingQty || 0} onChange={e => { const n = [...stallForm.products]; n[idx].tastingQty = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} /></div>
                                                </div>
                                            </div>

                                            <div className="flex items-center justify-end space-x-2 mt-1 pt-2 border-t border-gray-100">
                                                <span className="text-xs text-gray-400">小計 ${subtotal}</span>
                                                <span className="text-xs text-gray-400">-</span>
                                                <div className="flex items-center bg-red-50 rounded px-1">
                                                    <span className="text-xs text-red-500 mr-1">折價</span>
                                                    <input type="number" className="w-16 text-xs p-1 border border-red-200 rounded text-right text-red-600 font-bold" placeholder="0" value={prod.discount} onChange={e => { const n = [...stallForm.products]; n[idx].discount = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, products: n }) }} />
                                                </div>
                                                <span className="text-xs text-gray-400">=</span>
                                                <span className="text-sm font-bold text-indigo-700">實收 ${Math.max(0, rowNet)}</span>
                                            </div>
                                        </div>
                                    )})}
                                </div>
                            </div>
                            
                            <div className="bg-white border rounded-xl overflow-hidden">
                                <div className="bg-yellow-50 p-3 border-b flex justify-between items-center">
                                    <h4 className="font-bold text-yellow-800 flex items-center"><Gift size={16} className="mr-2"/> 促銷/贈品 (扣庫存/無營收)</h4>
                                    <button onClick={addGift} className="text-xs bg-yellow-600 text-white px-3 py-1.5 rounded shadow">+ 加入贈品</button>
                                </div>
                                <div className="p-2 space-y-2">
                                    {stallForm.gifts && stallForm.gifts.map((gift, idx) => (
                                        <div key={idx} className="flex flex-col p-2 border rounded bg-yellow-50/50 gap-2 relative">
                                            <button 
                                                onClick={() => { const n = stallForm.gifts.filter((_, i) => i !== idx); setStallForm({ ...stallForm, gifts: n }) }} 
                                                className="absolute top-2 right-2 text-red-400 hover:text-red-600 p-1"
                                            >
                                                <X size={16} />
                                            </button>

                                            <div className="flex items-center pr-6">
                                                <select className="flex-1 text-xs p-1 bg-transparent border-none outline-none font-bold text-gray-700" value={gift.recipeId} onChange={e => {
                                                    const n = [...stallForm.gifts];
                                                    n[idx].recipeId = e.target.value;
                                                    setStallForm({ ...stallForm, gifts: n });
                                                }}>
                                                    {(recipes||[]).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                                </select>
                                                <input type="number" className="w-16 text-xs p-1 rounded border text-center" placeholder="數量" value={gift.qty} onChange={e => { const n = [...stallForm.gifts]; n[idx].qty = parseFloat(e.target.value) || 0; setStallForm({ ...stallForm, gifts: n }) }} />
                                            </div>
                                            
                                            <div className="flex items-center border-t border-yellow-200 pt-1">
                                                <span className="text-[10px] text-yellow-700 mr-2 whitespace-nowrap">備註:</span>
                                                <input type="text" className="flex-1 text-xs p-1 bg-white border border-yellow-200 rounded text-gray-600" placeholder="例如: 買一送一..." value={gift.note || ''} onChange={e => { const n = [...stallForm.gifts]; n[idx].note = e.target.value; setStallForm({ ...stallForm, gifts: n }) }} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex justify-between items-center bg-gray-100 p-3 rounded-lg text-sm">
                                <div>預估營收: <span className="font-bold">${stats.revenue.toLocaleString()}</span></div>
                                <div className="text-right">
                                    <div className="font-bold text-red-500">總成本: ${Math.round(stats.totalCost).toLocaleString()}</div>
                                    <div className="text-[10px] text-gray-500">
                                        (食材${Math.round(stats.totalIngCost)} / 包材${Math.round(stats.totalPkgCost)} / 攤位雜支${Math.round(stats.fixedFee)})
                                    </div>
                                </div>
                                <div>淨利: <span className={`font-bold ${stats.netProfit > 0 ? 'text-green-600' : 'text-red-500'}`}>${stats.netProfit.toLocaleString()}</span></div>
                            </div>
                            
                            <div className="flex justify-end space-x-3 pt-4 border-t">
                                <button onClick={() => setEditingId(null)} className="px-4 py-2 bg-gray-200 rounded">取消</button>
                                <button onClick={save} className="px-4 py-2 bg-indigo-600 text-white rounded shadow">儲存活動</button>
                            </div>
                        </div>
                    </Modal>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-bold text-gray-800">擺攤管理</h2><button onClick={startNew} className="bg-indigo-600 text-white px-4 py-2 rounded shadow flex items-center"><Plus size={18} className="mr-1" /> 新增擺攤</button></div>
                    <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                        {safeStallsList.map(stall => {
                             const isCompleted = stall.status === 'completed';
                             const displayDate = stall.startDate === stall.endDate ? stall.startDate : `${stall.startDate} ~ ${stall.endDate}`;
                             const revenue = stall.totalRevenue || 0;
                             const cost = stall.totalCost || 0;
                             const netProfit = revenue - cost;
                             
                             return (
                                <Card key={stall.id} className="p-4 flex flex-col justify-between">
                                    <div className="mb-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <div><h3 className="font-bold text-lg">{stall.name}</h3><p className="text-xs text-gray-500 flex items-center"><MapPin size={10} className="mr-1"/>{stall.location}</p></div>
                                            <Badge color={isCompleted ? 'green' : 'yellow'}>{isCompleted ? '已結算' : '進行中'}</Badge>
                                        </div>
                                        <div className="text-sm text-gray-600 space-y-1">
                                            <div className="flex items-center text-xs"><Calendar size={12} className="mr-2"/> {displayDate}</div>
                                            <div className="flex items-center justify-between bg-gray-50 p-2 rounded"><span>總營收</span><span className="font-bold text-indigo-600">${revenue.toLocaleString()}</span></div>
                                            <div className="flex justify-between text-xs text-gray-400 mt-1">
                                                <span>物料/攤位費: ${Math.round(cost).toLocaleString()}</span>
                                                <span className={`${netProfit >= 0 ? 'text-green-600' : 'text-red-500'} font-bold`}>淨利: ${netProfit.toLocaleString()}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        {!isCompleted && <button onClick={() => onDeductStock(stall)} className="w-full py-2 bg-green-50 text-green-600 border border-green-200 rounded font-bold hover:bg-green-100 flex justify-center items-center"><CheckCircle size={16} className="mr-1"/> 結算並扣庫存</button>}
                                        <div className="flex space-x-2">
                                            <button onClick={() => startEdit(stall)} className="flex-1 py-1.5 bg-gray-100 text-gray-600 rounded text-sm hover:bg-gray-200">編輯詳細</button>
                                            <button onClick={() => onDelete(stall.id)} className="px-3 bg-red-50 text-red-500 rounded border border-red-100 flex items-center justify-center"><Trash2 size={16} color="#ef4444" className="mr-1"/><span className="text-xs font-bold">刪除</span></button>
                                        </div>
                                    </div>
                                </Card>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- InventoryTable ---
        const InventoryTable = ({ type, data, onSave, onDelete, onClearAll }) => {
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({ name: '', unit: 'g', packPrice: 0, packSize: 0, packCount: 0, yieldRate: 100, cost: 0, stock: 0, lowStockThreshold: 0, supplier: '', purchaseDate: '', nutrition: {} });
            const isIngredient = type === 'ingredients';
            const title = isIngredient ? '食材庫存' : '包材庫存';
            const fileInputRef = useRef(null);

            const startEdit = (item) => { 
                setEditingId(item.id); 
                const packSize = item.packSize || 0; 
                const defaultNutrition = NUTRIENTS.reduce((acc, curr) => ({...acc, [curr.key]: 0}), {});
                let displayYield = item.yieldRate;
                if (displayYield <= 1 && displayYield > 0) displayYield = displayYield * 100;
                setEditForm({ ...item, packPrice: item.packPrice !== undefined ? item.packPrice : (item.cost || 0), packSize: item.packSize !== undefined ? item.packSize : 0, packCount: item.packCount !== undefined ? item.packCount : (item.packSize > 0 ? (item.stock / item.packSize) : 0), yieldRate: displayYield, nutrition: item.nutrition || defaultNutrition, lowStockThreshold: item.lowStockThreshold || 0, purchaseDate: item.purchaseDate || '', supplier: item.supplier || '', unit: item.unit || 'g' }); 
            };
            const startNew = () => { setEditingId('new'); setEditForm({ name: '', unit: 'g', packPrice: 0, packSize: 0, packCount: 0, yieldRate: 100, cost: 0, stock: 0, lowStockThreshold: 0, supplier: '', purchaseDate: new Date().toISOString().split('T')[0], nutrition: NUTRIENTS.reduce((acc, curr) => ({...acc, [curr.key]: 0}), {}) }); };
            const handlePurchaseChange = (field, value) => { const newForm = { ...editForm, [field]: value }; const pPrice = parseFloat(newForm.packPrice) || 0; const pSize = parseFloat(newForm.packSize) || 0; const pCount = parseFloat(newForm.packCount) || 0; let pYield = parseFloat(newForm.yieldRate); if (pSize > 0) { const yieldFactor = (pYield || 100) / 100; newForm.cost = pPrice / (pSize * yieldFactor); } if (!newForm.parentIngredientId) { newForm.stock = pSize * pCount; } setEditForm(newForm); };
            const handleImportClick = () => fileInputRef.current.click();
            const handleFileUpload = async (e) => { const file = e.target.files[0]; if (!file) return; try { if (!window.XLSX) await loadScript("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"); const reader = new FileReader(); reader.onload = (evt) => { const data = new Uint8Array(evt.target.result); const workbook = window.XLSX.read(data, { type: 'array' }); const jsonData = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]); processExcelData(jsonData); }; reader.readAsArrayBuffer(file); } catch (error) { console.error(error); alert("匯入失敗"); } e.target.value = ''; };
            const processExcelData = (rows) => { let count = 0; const findKey = (row, keywords) => { const keys = Object.keys(row); for (const kw of keywords) { if (row[kw] !== undefined) return row[kw]; const foundKey = keys.find(k => k.includes(kw)); if (foundKey) return row[foundKey]; } return undefined; }; rows.forEach(row => { const name = findKey(row, ['名稱', '品項']); if (!name) return; const packPrice = parseFloat(findKey(row, ['進價', '價格']) || 0); const packSize = parseFloat(findKey(row, ['重量', '規格']) || 0); let unit = findKey(row, ['單位']) || 'g'; if(unit === '個') unit = 'pc'; const supplier = findKey(row, ['供應商', '廠商']) || ''; const lowStockThreshold = parseFloat(findKey(row, ['安全水位', '警示', '低庫存']) || 0); let yieldRate = 100; if (row['得率(%)'] !== undefined) yieldRate = row['得率(%)']; else if (row['得率%'] !== undefined) yieldRate = row['得率%']; else { const cleanKey = Object.keys(row).find(k => k.includes('得率') && !k.match(/[價額錢]/)); if (cleanKey) yieldRate = row[cleanKey]; } if (yieldRate <= 1 && yieldRate > 0) { yieldRate = yieldRate * 100; } yieldRate = parseFloat(yieldRate) || 100; const yieldFactor = yieldRate / 100; let cost = 0; if (packSize > 0) cost = packPrice / (packSize * yieldFactor); const nutrition = {}; NUTRIENTS.forEach(n => { nutrition[n.key] = parseFloat(findKey(row, [n.label]) || 0); }); const newItem = { id: generateUniqueId(), name, packPrice, packSize, unit, yieldRate, cost, stock: 0, lowStockThreshold, supplier, purchaseDate: new Date().toISOString().split('T')[0], nutrition }; onSave(newItem); count++; }); alert(`成功匯入 ${count} 筆資料！`); };
            const save = () => { if (!editForm.name) return alert('請輸入名稱'); onSave(editForm, editingId === 'new' ? null : editingId); setEditingId(null); };
            const closeModal = () => { setEditingId(null); setEditForm({}); };

            const confirmClearAll = () => {
                if (confirm(`確定要【清空】所有${title}資料嗎？\n\n此操作無法復原！`)) {
                    onClearAll();
                }
            };

            if (editingId) {
                const potentialParents = data.filter(i => i.id !== editingId && !i.parentIngredientId);
                const rawUnitPrice = editForm.packSize > 0 ? (editForm.packPrice / editForm.packSize) : 0;
                const realCost = typeof editForm.cost === 'number' ? editForm.cost : 0;
                return (<Modal title={`${editingId === 'new' ? '新增' : '編輯'} ${isIngredient ? '食材' : '包材'}`} onClose={closeModal}><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="space-y-4"><h4 className="font-bold text-indigo-600 border-b pb-2">基本資料</h4><div><label className="block text-xs font-bold text-gray-500 uppercase">品名</label><input className="w-full p-2 border rounded" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} placeholder="例如: 麵粉" /></div>{isIngredient && (<div className="bg-indigo-50 p-3 rounded border border-indigo-100"><label className="block text-xs font-bold text-indigo-700 mb-1 flex items-center"><Link size={14} className="mr-1"/> 連結實際庫存</label><select className="w-full p-2 border rounded text-sm" value={editForm.parentIngredientId || ''} onChange={e => setEditForm({...editForm, parentIngredientId: e.target.value, stock: 0})}><option value="">無 (獨立庫存)</option>{potentialParents.map(p => <option key={p.id} value={p.id}>連結至: {p.name} (庫存: {p.stock}{p.unit})</option>)}</select></div>)}<div className="bg-gray-50 p-4 rounded-lg space-y-3 border border-gray-200"><h5 className="font-bold text-sm text-gray-700">採購資訊 / 成本設定</h5><div className="flex space-x-2"><div className="flex-1"><label className="text-xs text-gray-500">一包價格($)</label><SafeNumberInput className="w-full p-2 border rounded bg-white" value={editForm.packPrice} onChange={v => handlePurchaseChange('packPrice', v)} /></div><div className="flex-1"><label className="text-xs text-gray-500">重量/規格</label><SafeNumberInput className="w-full p-2 border rounded bg-white" value={editForm.packSize} onChange={v => handlePurchaseChange('packSize', v)} /></div><div className="w-24"><label className="text-xs text-gray-500">單位</label><select className="w-full p-2 border rounded bg-white h-[42px]" value={editForm.unit} onChange={e=>setEditForm({...editForm, unit: e.target.value})}><option value="g">g</option><option value="ml">ml</option><option value="pc">個</option></select></div></div>{isIngredient && (<div className="flex items-center space-x-2"><div className="flex-1"><label className="text-xs text-gray-500">得率 (%)</label><SafeNumberInput className="w-full p-2 border rounded bg-white" value={editForm.yieldRate} onChange={v => handlePurchaseChange('yieldRate', v)} placeholder="100" /></div><div className="flex-1 pt-4 text-xs text-gray-400">實際可用: {Math.round((parseFloat(editForm.packSize)||0) * ((parseFloat(editForm.yieldRate)||100)/100 || 1))}{editForm.unit}</div></div>)}{!editForm.parentIngredientId && (<div><label className="text-xs text-gray-500">購買包數 (加總庫存)</label><SafeNumberInput className="w-full p-2 border rounded bg-white" value={editForm.packCount} onChange={v => handlePurchaseChange('packCount', v)} /></div>)}<div className="bg-white p-3 border border-indigo-100 rounded text-sm"><div className="flex justify-between text-gray-500 text-xs mb-1"><span>原始單價:</span><span>${rawUnitPrice.toFixed(4)} / {editForm.unit}</span></div><div className="flex justify-between font-bold text-indigo-700 border-t pt-1 mt-1"><span className="flex items-center"><Info size={12} className="mr-1"/>真實單價 (含損耗):</span><span>${realCost < 0.0001 && realCost > 0 ? '< 0.0001' : realCost.toFixed(4)} / {editForm.unit}</span></div></div></div><div className="grid grid-cols-2 gap-2 bg-red-50 p-2 rounded border border-red-100"><div><label className="text-xs text-red-700 font-bold">安全水位</label><SafeNumberInput className="w-full p-2 border rounded bg-white" value={editForm.lowStockThreshold} onChange={v => setEditForm({...editForm, lowStockThreshold: parseFloat(v) || 0})} placeholder="警示值" /></div><div className="flex items-end pb-2 text-xs text-red-500 font-bold">單位: {editForm.unit}</div></div><div className="grid grid-cols-2 gap-2"><div><label className="text-xs text-gray-500">供應商</label><input className="w-full p-2 border rounded" value={editForm.supplier} onChange={e => setEditForm({...editForm, supplier: e.target.value})} /></div><div><label className="text-xs text-gray-500">購入日期</label><input type="date" className="w-full p-2 border rounded" value={editForm.purchaseDate} onChange={e => setEditForm({...editForm, purchaseDate: e.target.value})} /></div></div></div>{isIngredient && (<div className="space-y-4"><h4 className="font-bold text-green-600 border-b pb-2 flex items-center"><FileText size={18} className="mr-2"/> 營養標示 (每 100g)</h4><div className="grid grid-cols-2 gap-3 bg-green-50 p-4 rounded-lg border border-green-100">{NUTRIENTS.map(nut => (<div key={nut.key}><label className="text-xs text-gray-500">{nut.label} ({nut.unit})</label><SafeNumberInput className="w-full p-2 border rounded bg-white focus:ring-1 focus:ring-green-500" value={editForm.nutrition?.[nut.key] || 0} onChange={v => setEditForm({...editForm, nutrition: { ...editForm.nutrition, [nut.key]: parseFloat(v) || 0 }})} /></div>))}</div></div>)}</div><div className="flex justify-end space-x-3 mt-8 pt-4 border-t"><button onClick={closeModal} className="px-6 py-2 bg-gray-200 rounded-lg font-bold text-gray-600">取消</button><button onClick={save} className="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold shadow-lg hover:bg-indigo-700">儲存資料</button></div></Modal>);
            }
            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-center space-y-2 md:space-y-0">
                        <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
                        <div className="flex space-x-2">
                             <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx, .xls" className="hidden" />
                             <button onClick={handleImportClick} className="bg-green-600 text-white px-4 py-2 rounded-lg flex items-center shadow hover:bg-green-700"><Upload size={18} className="mr-1" /> 匯入 Excel</button>
                             {/* 🔥 V139: 清空按鈕 */}
                             {data.length > 0 && <button onClick={confirmClearAll} className="bg-red-500 text-white px-3 py-2 rounded-lg flex items-center shadow hover:bg-red-600 text-sm"><Trash2 size={16} className="mr-1"/> 清空</button>}
                             <button onClick={startNew} className="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center hover:bg-indigo-700"><Plus size={18} className="mr-1" /> 新增</button>
                        </div>
                    </div>
                    <div className="grid gap-3 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">{(data||[]).map(item => { const parent = item.parentIngredientId ? data.find(d => d.id === item.parentIngredientId) : null; const isLow = !parent && item.stock < (item.lowStockThreshold || (item.unit==='g'?500:10)); return (<div key={item.id} className={`bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-between group hover:border-indigo-300 transition-colors ${isLow ? 'border-red-300 ring-1 ring-red-200' : 'border-gray-100'}`}><div><div className="flex justify-between items-start mb-2"><h4 className="font-bold text-lg text-gray-800">{item.name}</h4>{parent ? (<Badge color="blue">連: {parent.name}</Badge>) : (<Badge color={isLow ? 'red' : 'gray'}>{item.stock} {item.unit}</Badge>)}</div><div className="text-sm text-gray-500 mb-2"><div className="flex items-center"><MapPin size={12} className="mr-1"/> {item.supplier || '未設定'}</div><div className="flex items-center"><Calendar size={12} className="mr-1"/> {item.purchaseDate || '--'}</div></div>{item.packPrice !== undefined && (<div className="text-xs bg-gray-50 p-2 rounded text-gray-600 mb-2">真實單價: ${typeof item.cost === 'number' ? item.cost.toFixed(4) : 0} / {item.unit} {item.yieldRate < 100 && <span className="text-orange-500 ml-1">(得率{item.yieldRate}%)</span>}</div>)}{isLow && <div className="text-xs text-red-500 font-bold flex items-center mb-1"><AlertTriangle size={12} className="mr-1"/> 低於水位 {item.lowStockThreshold}{item.unit}</div>}</div><div className="flex justify-end space-x-2 mt-3 pt-3 border-t border-gray-50"><button onClick={() => startEdit(item)} className="px-3 py-1.5 text-indigo-600 bg-indigo-50 rounded text-sm font-medium flex items-center"><Edit3 size={14} className="mr-1"/> 編輯</button><button onClick={() => onDelete(item.id)} className="px-3 py-1.5 text-red-500 bg-red-50 rounded text-sm font-medium flex items-center border border-red-200 hover:bg-red-100"><Trash2 size={16} className="mr-1"/> 刪除</button></div></div>); })}</div>
                </div>
            );
        };

        // --- App ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [recipes, setRecipes] = useStickyState([], 'baking_recipes_v3');
            const [ingredients, setIngredients] = useStickyState([], 'baking_ingredients_v3');
            const [packaging, setPackaging] = useStickyState([], 'baking_packaging_v3');
            const [orders, setOrders] = useStickyState([], 'baking_orders_v3');
            const [stalls, setStalls] = useStickyState([], 'baking_stalls_v3');
            const [firebaseStatus, setFirebaseStatus] = useState('disconnected');

            useEffect(() => {
                const repairAndDedupe = (data, setter, name) => {
                    if (!Array.isArray(data)) return;
                    let hasChanges = false;
                    const seenIds = new Set();
                    
                    const fixedData = data.map(item => {
                        let currentId = item.id;
                        if (!currentId || seenIds.has(currentId)) {
                            hasChanges = true;
                            currentId = `fixed_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
                        }
                        seenIds.add(currentId);
                        return { ...item, id: currentId };
                    });

                    if (hasChanges) {
                        console.log(`正在修復 ${name} 的 ID 問題...`);
                        setter(fixedData);
                    }
                };

                repairAndDedupe(recipes, setRecipes, 'recipes');
                repairAndDedupe(ingredients, setIngredients, 'ingredients');
                repairAndDedupe(packaging, setPackaging, 'packaging');
                repairAndDedupe(orders, setOrders, 'orders');
                repairAndDedupe(stalls, setStalls, 'stalls');
            }, [recipes, ingredients, packaging, orders, stalls]);

            useEffect(() => {
                const savedConfig = localStorage.getItem('baking_firebase_config');
                if (savedConfig && window.firebase) {
                    try {
                        const config = JSON.parse(savedConfig);
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        setFirebaseStatus('connected');
                        
                        const db = firebase.firestore();
                        const collections = [
                            { name: 'recipes', setter: setRecipes },
                            { name: 'ingredients', setter: setIngredients },
                            { name: 'packaging', setter: setPackaging },
                            { name: 'orders', setter: setOrders },
                            { name: 'stalls', setter: setStalls }
                        ];

                        const unsubscribes = [];
                        
                        collections.forEach(({ name, setter }) => {
                            const unsub = db.collection(name).onSnapshot(snapshot => {
                                if (!snapshot.empty) {
                                    const remoteData = snapshot.docs.map(doc => doc.data());
                                    setter(remoteData);
                                }
                            }, error => {
                                console.error(`同步 ${name} 失敗:`, error);
                            });
                            unsubscribes.push(unsub);
                        });

                        return () => {
                            unsubscribes.forEach(func => func());
                        };

                    } catch (e) { console.error("Firebase Init Error", e); }
                }
            }, []);

            const onConnectFirebase = (config) => { localStorage.setItem('baking_firebase_config', JSON.stringify(config)); window.location.reload(); };
            const onDisconnectFirebase = () => { localStorage.removeItem('baking_firebase_config'); window.location.reload(); };
            
            const handleSave = async (col, data, id) => { 
                const map = { 'recipes': setRecipes, 'ingredients': setIngredients, 'packaging': setPackaging, 'orders': setOrders, 'stalls': setStalls }; 
                const setter = map[col]; 
                const newId = id || `doc_${Date.now()}_${Math.random().toString(36).substr(2,5)}`; 
                const finalData = { ...data, id: newId };

                setter(prev => { 
                    const safePrev = Array.isArray(prev) ? prev : [];
                    if (id) return safePrev.map(item => item.id === id ? finalData : item); 
                    return [...safePrev, finalData]; 
                }); 
                
                if (firebaseStatus === 'connected') { 
                    try { await firebase.firestore().collection(col).doc(newId).set(finalData, { merge: true }); } 
                    catch(e) { alert("雲端儲存失敗，請檢查網路！"); }
                } 
            };
            
            const handleDelete = async (col, id) => { 
                if (!confirm('確定刪除？此操作無法復原。')) return; 
                const map = { 'recipes': setRecipes, 'ingredients': setIngredients, 'packaging': setPackaging, 'orders': setOrders, 'stalls': setStalls }; 
                
                map[col](prev => (Array.isArray(prev) ? prev : []).filter(i => String(i.id) !== String(id))); 
                
                if (firebaseStatus === 'connected') {
                    try { await firebase.firestore().collection(col).doc(id).delete(); } 
                    catch (e) { console.error("雲端刪除失敗", e); }
                }
            };

            const handleClearAll = async (col) => {
                const map = { 'recipes': setRecipes, 'ingredients': setIngredients, 'packaging': setPackaging, 'orders': setOrders, 'stalls': setStalls }; 
                map[col]([]);
                if (firebaseStatus === 'connected') {
                    const db = firebase.firestore();
                    const batch = db.batch();
                    const snapshot = await db.collection(col).get();
                    snapshot.docs.forEach((doc) => { batch.delete(doc.ref); });
                    try { await batch.commit(); alert("雲端資料也已清空！"); } 
                    catch(e) { console.error(e); alert("本地已清空，但雲端刪除部分失敗。"); }
                }
            };
            
            const handleCompleteOrder = (order, newStatus) => { 
                if (!confirm(`確定要將訂單設為 ${newStatus} 並扣除相應庫存嗎？`)) return; 
                let errors = []; const newIng = [...ingredients]; const newPkg = [...packaging]; 
                order.items.forEach(item => { 
                    const r = recipes.find(rec => rec.id === item.recipeId); 
                    if (!r) { errors.push(`錯誤：找不到商品「${item.recipeName}」的食譜。`); return; } 
                    if(r.items) { r.items.forEach(ri => { let targetId = ri.id; const originalIng = newIng.find(i => i.id === ri.id); if (originalIng && originalIng.parentIngredientId) targetId = originalIng.parentIngredientId; const ingIdx = newIng.findIndex(i => i.id === targetId); if(ingIdx > -1) { const deduct = (ri.qty / (r.yieldCount||1)) * item.qty; newIng[ingIdx] = {...newIng[ingIdx], stock: newIng[ingIdx].stock - deduct}; } else { errors.push(`警告：找不到食材 ID:${targetId}`); } }); } 
                    if(r.packagingItems) { r.packagingItems.forEach(pi => { const pkgIdx = newPkg.findIndex(p => p.id === pi.id); if(pkgIdx > -1) { newPkg[pkgIdx] = {...newPkg[pkgIdx], stock: newPkg[pkgIdx].stock - (pi.qty * item.qty)}; } else { errors.push(`警告：找不到包材 ID:${pi.id}`); } }) } 
                }); 
                if (errors.length > 0) alert(errors.join('\n')); 
                setIngredients(newIng); setPackaging(newPkg); 
                handleSave('orders', {...order, status: newStatus}, order.id);
                newIng.forEach(i => handleSave('ingredients', i, i.id));
                newPkg.forEach(p => handleSave('packaging', p, p.id));
                alert('訂單已完成並扣除庫存！'); 
            };

            const handleStallStockDeduct = (stall) => { 
                if (!confirm('確定要依照製作量與贈品扣除庫存嗎？')) return; 
                const newIng = [...ingredients]; const newPkg = [...packaging]; 
                (stall.products || []).forEach(prod => { 
                    const r = recipes.find(rec => rec.id === prod.recipeId); 
                    if(r) { 
                        const totalDeductQty = (prod.soldQty || 0) + (prod.wasteQty || 0) + (prod.tastingQty || 0);
                        if(totalDeductQty > 0) {
                            const recipeDetails = (() => {
                                let totalWeight = 0;
                                (r.items||[]).forEach(i => {
                                    const ing = ingredients.find(ing => ing.id === i.id) || ingredients.find(ing => ing.name === i.name);
                                    if(ing && (ing.unit === 'g' || ing.unit === 'ml')) totalWeight += i.qty;
                                });
                                return { totalWeight, yieldCount: r.yieldCount || 1 };
                            })();
                            let deductRatio = 0;
                            if (prod.unit === 'g') { deductRatio = totalDeductQty / (recipeDetails.totalWeight || 1); } 
                            else { deductRatio = totalDeductQty / (recipeDetails.yieldCount || 1); }
                            r.items.forEach(ri => { 
                                let targetId = ri.id; 
                                const originalIng = newIng.find(i => i.id === ri.id); 
                                if (originalIng && originalIng.parentIngredientId) targetId = originalIng.parentIngredientId; 
                                const ingIdx = newIng.findIndex(i => i.id === targetId); 
                                if(ingIdx > -1) { const deduct = ri.qty * deductRatio; newIng[ingIdx] = {...newIng[ingIdx], stock: newIng[ingIdx].stock - deduct}; } 
                            }); 
                             if (prod.unit !== 'g') {
                                (r.packagingItems || []).forEach(pi => { 
                                    const pkgIdx = newPkg.findIndex(p => p.id === pi.id); 
                                    if(pkgIdx > -1) { newPkg[pkgIdx] = {...newPkg[pkgIdx], stock: newPkg[pkgIdx].stock - (pi.qty * totalDeductQty)}; } 
                                }); 
                            }
                        }
                    } 
                }); 
                (stall.gifts || []).forEach(gift => {
                    const r = recipes.find(rec => rec.id === gift.recipeId);
                    if(r && gift.qty > 0) {
                         r.items.forEach(ri => { 
                            let targetId = ri.id; 
                            const originalIng = newIng.find(i => i.id === ri.id); 
                            if (originalIng && originalIng.parentIngredientId) targetId = originalIng.parentIngredientId; 
                            const ingIdx = newIng.findIndex(i => i.id === targetId); 
                            if(ingIdx > -1) { const amountPerUnit = ri.qty / (r.yieldCount || 1); const deduct = amountPerUnit * gift.qty; newIng[ingIdx] = {...newIng[ingIdx], stock: newIng[ingIdx].stock - deduct}; } 
                        }); 
                        (r.packagingItems || []).forEach(pi => { 
                            const pkgIdx = newPkg.findIndex(p => p.id === pi.id); 
                            if(pkgIdx > -1) { newPkg[pkgIdx] = {...newPkg[pkgIdx], stock: newPkg[pkgIdx].stock - (pi.qty * gift.qty)}; } 
                        }); 
                    }
                });
                setIngredients(newIng); setPackaging(newPkg); 
                handleSave('stalls', {...stall, status: 'completed'}, stall.id);
                newIng.forEach(i => handleSave('ingredients', i, i.id));
                newPkg.forEach(p => handleSave('packaging', p, p.id));
                alert('擺攤庫存 (含耗損、試吃、贈品) 已扣除！'); 
            };

            // 🔥 新增 POS 收銀至選單
            const navItems = [ 
                { id: 'dashboard', label: '儀表板', icon: LayoutDashboard }, 
                { id: 'pos', label: 'POS 收銀', icon: Calculator }, 
                { id: 'report', label: '銷售報表', icon: BarChart2 },
