<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烘焙大師 Pro - V120 訂單損益分析版 + POS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script src="https://unpkg.com/lucide@0.294.0/dist/umd/lucide.min.js"></script>
    
    <style>
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }

        /* POS 數字鍵盤按鈕 */
        .numpad-btn {
            background-color: white;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 64px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.1s;
        }
        .numpad-btn:active {
            transform: scale(0.95);
            background-color: #e2e8f0;
        }

        /* POS 商品按鈕 */
        .product-btn {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .product-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Icon ---
        const Icon = ({ name, size = 24, className = "", ...props }) => {
            if (!window.lucide || !window.lucide.icons) return <span style={{width:size, height:size}} className="inline-block bg-gray-200 rounded"></span>;
            const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            const iconData = window.lucide.icons[kebabName] || window.lucide.icons[name.toLowerCase()];
            if (!iconData) return null;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`lucide lucide-${name} ${className}`} {...props}>
                    {iconData.map((child, index) => React.createElement(child[0], { key: index, ...child[1] }))}
                </svg>
            );
        };
        const LucideProxy = new Proxy({}, { get: (target, prop) => (props) => <Icon name={prop} {...props} /> });
        const { ChefHat, ShoppingBag, PieChart, Package, Utensils, Zap, Plus, Trash2, Save, Image: ImageIcon, ArrowLeft, Search, DollarSign, MapPin, Calculator, Calendar, AlertTriangle, LayoutDashboard, Edit3, X, RefreshCw, ClipboardList, CheckCircle, FileText, Upload, Truck, Store, AlertCircle, Tent, Coins, Filter, Clock, Flame, Percent, Link, Box, TrendingUp, TrendingDown, Activity, BarChart2, Settings, Download, UploadCloud, Cloud, CloudOff, Database, Globe, HelpCircle, Menu, Tag, Gift, EyeOff, PlusCircle, Trash, Info, RefreshCcw, Unplug, Leaf, Wrench, Users, Heart, Minus } = LucideProxy;

        // --- Utils ---
        const loadScript = (src) => new Promise((resolve, reject) => { if (document.querySelector(`script[src="${src}"]`)) return resolve(); const script = document.createElement('script'); script.src = src; script.onload = resolve; script.onerror = reject; document.head.appendChild(script); });
        const generateUniqueId = () => `id_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        
        const CHART_COLORS = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#3b82f6', '#14b8a6'];
        const NUTRIENTS = [{ key: 'calories', label: '熱量', unit: 'kcal' }, { key: 'protein', label: '蛋白質', unit: 'g' }, { key: 'fat', label: '脂肪', unit: 'g' }, { key: 'saturatedFat', label: '飽和脂肪', unit: 'g' }, { key: 'transFat', label: '反式脂肪', unit: 'g' }, { key: 'carbs', label: '碳水化合物', unit: 'g' }, { key: 'sugar', label: '糖', unit: 'g' }, { key: 'sodium', label: '鈉', unit: 'mg' }];

        // --- Hook ---
        const useStickyState = (defaultValue, key) => {
            const [value, setValue] = useState(() => {
                try {
                    const stickyValue = window.localStorage.getItem(key);
                    return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
                } catch (e) { return defaultValue; }
            });
            useEffect(() => {
                window.localStorage.setItem(key, JSON.stringify(value));
            }, [key, value]);
            return [value, setValue];
        };

        // --- Helpers: Financial Calculations ---
        const calculateRecipeUnitCost = (recipe, ingredients, packaging) => {
            if (!recipe) return 0;
            let totalCost = 0;
            const safeIng = Array.isArray(ingredients) ? ingredients : [];
            const safePkg = Array.isArray(packaging) ? packaging : [];
            
            // Ingredients
            (recipe.items || []).forEach(item => {
                const ing = safeIng.find(i => i.id === item.id) || safeIng.find(i => i.name === item.name);
                if (ing) totalCost += (ing.cost || 0) * item.qty;
            });
            // Packaging
            (recipe.packagingItems || []).forEach(item => {
                const pkg = safePkg.find(p => p.id === item.id) || safePkg.find(p => p.name === item.name);
                if (pkg) totalCost += (pkg.cost || 0) * item.qty;
            });
            return totalCost / (parseFloat(recipe.yieldCount) || 1);
        };

        const calculateOrderFinancials = (order, recipes, ingredients, packaging) => {
            let materialCost = 0;
            const safeRecipes = Array.isArray(recipes) ? recipes : [];
            const safeIng = Array.isArray(ingredients) ? ingredients : [];
            const safePkg = Array.isArray(packaging) ? packaging : [];
            
            (order.items || []).forEach(item => {
                const recipe = safeRecipes.find(r => r.id === item.recipeId);
                const unitCost = calculateRecipeUnitCost(recipe, safeIng, safePkg);
                materialCost += unitCost * (item.qty || 0);
            });
            
            // Profit = Total Revenue - Material Cost
            const profit = (order.totalAmount || 0) - materialCost;
            return { cost: materialCost, profit };
        };

        // --- UI Components ---
        const Card = ({ children, className = "", onClick }) => <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className} ${onClick ? 'cursor-pointer hover:shadow-md transition-shadow' : ''}`}>{children}</div>;
        const Badge = ({ children, color = "gray" }) => {
            const colors = { gray: "bg-gray-100 text-gray-800", red: "bg-red-100 text-red-800", green: "bg-green-100 text-green-800", yellow: "bg-yellow-100 text-yellow-800", blue: "bg-blue-100 text-blue-800", indigo: "bg-indigo-100 text-indigo-800" };
            return <span className={`px-2 py-1 rounded-md text-xs font-medium ${colors[color]}`}>{children}</span>;
        };
        const Modal = ({ title, children, onClose }) => (
            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in">
                <div className="bg-white rounded-xl w-full max-w-7xl max-h-[95vh] flex flex-col shadow-2xl transform transition-all">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                        <h3 className="font-bold text-lg text-gray-800">{title}</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-gray-700 p-1 rounded-full hover:bg-gray-200 transition-colors"><X size={24} /></button>
                    </div>
                    <div className="p-6 overflow-y-auto custom-scrollbar flex-1">{children}</div>
                </div>
            </div>
        );
        
        const SafeNumberInput = ({ value, onChange, className, placeholder, ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            useEffect(() => { setLocalValue(value); }, [value]);
            const handleChange = (e) => {
                const val = e.target.value;
                setLocalValue(val);
                if (val === '' || !isNaN(val) || val === '-' || val.endsWith('.')) {
                    onChange(val);
                }
            };
            return <input type="text" inputMode="decimal" className={className} value={localValue} onChange={handleChange} placeholder={placeholder} {...props} />;
        };

        const SimplePieChart = ({ data }) => {
            if (!data || data.length === 0) return <div className="h-full flex items-center justify-center text-gray-400">無數據</div>;
            const total = data.reduce((acc, cur) => acc + cur.value, 0); 
            if (total === 0) return <div className="h-full flex items-center justify-center text-gray-400">尚無營收</div>;
            let startAngle = 0;
            return (<div className="relative w-48 h-48 mx-auto"><svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">{data.map((slice, i) => { const angle = (slice.value / total) * 360; if (angle === 360) return <circle key={i} cx="50" cy="50" r="50" fill={slice.color} />; const x1 = 50 + 50 * Math.cos(Math.PI * startAngle / 180), y1 = 50 + 50 * Math.sin(Math.PI * startAngle / 180), x2 = 50 + 50 * Math.cos(Math.PI * (startAngle + angle) / 180), y2 = 50 + 50 * Math.sin(Math.PI * (startAngle + angle) / 180), largeArc = angle > 180 ? 1 : 0; const pathData = `M 50 50 L ${x1} ${y1} A 50 50 0 ${largeArc} 1 ${x2} ${y2} Z`; startAngle += angle; return <path key={i} d={pathData} fill={slice.color} stroke="white" strokeWidth="1" />; })}</svg></div>);
        };

        // --- POS Manager Component ---
        const POSManager = ({ stalls, recipes, ingredients, packaging, onSaveStall }) => {
            const [selectedStallId, setSelectedStallId] = useState('');
            const [cart, setCart] = useState([]);
            const [showCheckoutModal, setShowCheckoutModal] = useState(false);
            const [cashReceivedStr, setCashReceivedStr] = useState('');

            const activeStalls = (stalls || []).filter(s => s && s.status !== 'completed');
            const activeStall = activeStalls.find(s => s.id === selectedStallId);

            useEffect(() => {
                if (activeStalls.length === 1 && !selectedStallId) {
                    setSelectedStallId(activeStalls[0].id);
                }
            }, [activeStalls, selectedStallId]);

            const addToCart = (prod, recipe) => {
                setCart(prev => {
                    const existing = prev.find(item => item.recipeId === prod.recipeId);
                    if (existing) {
                        return prev.map(item => item.recipeId === prod.recipeId ? { ...item, qty: item.qty + 1 } : item);
                    }
                    return [...prev, { recipeId: prod.recipeId, name: recipe.name, price: prod.price, qty: 1 }];
                });
            };

            const updateQty = (recipeId, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.recipeId === recipeId) {
                        return { ...item, qty: item.qty + delta };
                    }
                    return item;
                }).filter(item => item.qty > 0));
            };

            const clearCart = () => setCart([]);

            const cartTotal = useMemo(() => cart.reduce((sum, item) => sum + (item.price * item.qty), 0), [cart]);

            const changeAmount = useMemo(() => {
                const received = parseInt(cashReceivedStr || 0, 10);
                return received - cartTotal;
            }, [cashReceivedStr, cartTotal]);

            const appendCash = (val) => {
                if (cashReceivedStr.length > 6) return;
                if (val === '00' && cashReceivedStr === '') return;
                setCashReceivedStr(prev => prev + val);
            };
            const setCash = (val) => setCashReceivedStr(val.toString());

            // Cost Calculation Helper for Dynamic Sync
            const getDetailedCost = (recipeId) => {
                const r = recipes.find(rc => rc.id === recipeId);
                if (!r) return { totalPerPortion: 0 };
                
                let ingCostBatch = 0;
                let pkgCostBatch = 0;
                
                (r.items || []).forEach(item => {
                    const ing = ingredients.find(i => i.id === item.id) || ingredients.find(i => i.name === item.name);
                    if (ing) { ingCostBatch += (ing.cost || 0) * item.qty; }
                });

                (r.packagingItems || []).forEach(item => {
                    const pkg = packaging.find(p => p.id === item.id) || packaging.find(p => p.name === item.name);
                    if (pkg) { pkgCostBatch += (pkg.cost || 0) * item.qty; }
                });

                const yieldCount = parseFloat(r.yieldCount) || 1;
                return { totalPerPortion: (ingCostBatch + pkgCostBatch) / yieldCount };
            };

            const completeOrder = () => {
                if (changeAmount < 0) return;

                const updatedStall = { ...activeStall };
                const updatedProducts = [...(updatedStall.products || [])];

                // Update sold quantities
                cart.forEach(cartItem => {
                    const pIdx = updatedProducts.findIndex(p => p.recipeId === cartItem.recipeId);
                    if (pIdx > -1) {
                        updatedProducts[pIdx] = {
                            ...updatedProducts[pIdx],
                            soldQty: (parseFloat(updatedProducts[pIdx].soldQty) || 0) + cartItem.qty
                        };
                    }
                });

                updatedStall.products = updatedProducts;
                
                // Recalculate full stall revenue & cost
                let estRevenue = 0;
                let estTotalCost = 0; 
                (updatedProducts || []).forEach(p => {
                    const rowRevenue = ((p.soldQty || 0) * (p.price || 0)) - (p.discount || 0);
                    estRevenue += rowRevenue;

                    const breakdown = getDetailedCost(p.recipeId);
                    const totalQty = (p.soldQty || 0) + (p.wasteQty || 0) + (p.tastingQty || 0);
                    estTotalCost += totalQty * breakdown.totalPerPortion;
                });

                (updatedStall.gifts || []).forEach(g => {
                     const breakdown = getDetailedCost(g.recipeId);
                     estTotalCost += (g.qty || 0) * breakdown.totalPerPortion;
                });

                const fixedFee = (parseFloat(updatedStall.boothFee) || 0) + (parseFloat(updatedStall.miscFee) || 0);
                estTotalCost += fixedFee;

                updatedStall.totalRevenue = estRevenue;
                updatedStall.totalCost = estTotalCost;

                onSaveStall(updatedStall, updatedStall.id);

                alert(`結帳成功！\n找零：$${changeAmount}`);
                clearCart();
                setShowCheckoutModal(false);
                setCashReceivedStr('');
            };

            return (
                <div className="flex flex-col h-full bg-gray-50 rounded-xl overflow-hidden shadow-sm border border-gray-200">
                    <div className="flex flex-col md:flex-row justify-between items-center bg-white p-4 shadow-sm border-b border-gray-200 z-10 shrink-0 gap-3">
                        <h2 className="text-xl font-bold text-gray-800 flex items-center"><Calculator className="mr-2 text-indigo-600"/> 現場收銀 (POS)</h2>
                        <select 
                            className="w-full md:w-auto border border-indigo-200 p-2 rounded-lg font-bold bg-indigo-50 text-indigo-700 outline-none focus:ring-2 focus:ring-indigo-500" 
                            value={selectedStallId} 
                            onChange={e => setSelectedStallId(e.target.value)}
                        >
                            <option value="">-- 選擇正在營業的擺攤活動 --</option>
                            {activeStalls.map(s => <option key={s.id} value={s.id}>{s.name} ({s.location})</option>)}
                        </select>
                    </div>

                    {!activeStall ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-gray-400 h-full p-8 text-center">
                            <Store size={64} className="mb-4 text-gray-300" />
                            <p className="font-bold text-lg text-gray-500">請從上方選擇一個「進行中」的擺攤活動</p>
                            <p className="text-sm mt-2">若無選項，請先至「擺攤管理」新增並設定欲販售的商品。</p>
                        </div>
                    ) : (
                        <div className="flex-1 flex flex-col lg:flex-row overflow-hidden relative">
                            <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                                {(!activeStall.products || activeStall.products.length === 0) ? (
                                    <div className="text-center py-10">
                                        <Package size={48} className="mx-auto text-gray-300 mb-3" />
                                        <p className="text-gray-500">此擺攤尚未設定販售商品</p>
                                        <p className="text-xs text-gray-400 mt-1">請至擺攤管理編輯並加入商品</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        {activeStall.products.map((p, idx) => {
                                            const r = (recipes||[]).find(rec => rec.id === p.recipeId);
                                            if (!r) return null;
                                            return (
                                                <button 
                                                    key={idx} 
                                                    onClick={() => addToCart(p, r)} 
                                                    className="product-btn bg-white border-2 border-transparent hover:border-indigo-200 rounded-2xl p-4 flex flex-col items-center justify-center shadow-sm hover:shadow-md active:bg-indigo-50 min-h-[110px]"
                                                >
                                                    <span className="font-bold text-gray-800 text-base leading-tight mb-2 text-center line-clamp-2">{r.name}</span>
                                                    <span className="text-indigo-600 font-black text-lg">${p.price}</span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="w-full lg:w-96 flex flex-col bg-white shadow-[-4px_0_15px_rgba(0,0,0,0.05)] border-t lg:border-t-0 lg:border-l border-gray-200 shrink-0 h-1/2 lg:h-full z-10">
                                <div className="bg-gray-50 p-3 border-b border-gray-200 font-bold text-gray-700 flex justify-between items-center shrink-0">
                                    <span>購物車清單</span>
                                    {cart.length > 0 && <span className="bg-indigo-600 text-white text-xs px-2 py-1 rounded-full">{cart.reduce((s,i)=>s+i.qty,0)} 件</span>}
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                                    {cart.length === 0 && <div className="text-center text-gray-400 py-10 text-sm">點擊左側商品加入清單</div>}
                                    {cart.map(item => (
                                        <div key={item.recipeId} className="flex justify-between items-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm">
                                            <div className="flex-1 min-w-0 pr-2">
                                                <div className="font-bold text-gray-800 text-sm truncate">{item.name}</div>
                                                <div className="text-xs text-gray-500">${item.price}</div>
                                            </div>
                                            <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-1 shrink-0">
                                                <button onClick={() => updateQty(item.recipeId, -1)} className="w-7 h-7 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 hover:text-red-500"><Minus size={14}/></button>
                                                <span className="w-6 text-center font-bold text-sm">{item.qty}</span>
                                                <button onClick={() => updateQty(item.recipeId, 1)} className="w-7 h-7 flex items-center justify-center bg-white rounded shadow-sm text-gray-600 hover:text-indigo-500"><Plus size={14}/></button>
                                            </div>
                                            <div className="w-16 text-right font-black text-indigo-600 shrink-0">
                                                ${item.price * item.qty}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-4 bg-gray-50 border-t border-gray-200 shrink-0">
                                    <div className="flex justify-between items-end mb-4">
                                        <span className="text-gray-600 font-bold">應收總計</span>
                                        <span className="text-3xl font-black text-indigo-600">${cartTotal}</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={clearCart} className="px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-600 font-bold w-1/3 hover:bg-gray-100 transition shadow-sm">
                                            清空
                                        </button>
                                        <button 
                                            onClick={() => { setCashReceivedStr(''); setShowCheckoutModal(true); }} 
                                            disabled={cart.length === 0} 
                                            className={`flex-1 py-3 rounded-xl font-black text-white text-lg transition shadow-md flex items-center justify-center gap-2 ${cart.length === 0 ? 'bg-gray-300 shadow-none' : 'bg-indigo-600 hover:bg-indigo-700 active:scale-95'}`}
                                        >
                                            結帳收款 <ArrowLeft className="rotate-180" size={20}/>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCheckoutModal && (
                        <div className="fixed inset-0 z-[60] flex flex-col bg-gray-100/90 backdrop-blur-sm animate-fade-in p-4 sm:p-6 justify-end sm:justify-center items-center">
                            <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                                <header className="bg-gray-50 border-b border-gray-200 px-4 py-4 flex justify-between items-center">
                                    <h2 className="text-lg font-black text-gray-800">結帳找零計算</h2>
                                    <button onClick={() => setShowCheckoutModal(false)} className="text-gray-400 hover:text-gray-700 bg-white rounded-full p-1 border shadow-sm">
                                        <X size={20}/>
                                    </button>
                                </header>

                                <div className="p-5 flex flex-col gap-4">
                                    <div className="bg-white rounded-2xl p-4 shadow-inner border border-gray-100 bg-gray-50">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-gray-500 font-bold text-sm">應收總計</span>
                                            <span className="text-xl font-black text-gray-800">${cartTotal}</span>
                                        </div>
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-gray-500 font-bold text-sm">實收金額</span>
                                            <span className="text-3xl font-black text-indigo-600 border-b-2 border-indigo-200 min-w-[120px] text-right pb-1">
                                                {cashReceivedStr || '0'}
                                            </span>
                                        </div>
                                        <div className="flex justify-between items-center pt-3 border-t border-dashed border-gray-300">
                                            <span className={`text-sm font-bold ${changeAmount >= 0 ? 'text-green-600' : 'text-red-500'}`}>找零</span>
                                            <span className={`text-4xl font-black ${changeAmount >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                                                ${changeAmount >= 0 ? changeAmount : 0}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-4 gap-2">
                                        <button onClick={() => setCash(cartTotal)} className="bg-indigo-50 text-indigo-700 font-bold py-2 rounded-xl text-sm border border-indigo-100 hover:bg-indigo-100">剛好</button>
                                        <button onClick={() => setCash(100)} className="bg-gray-50 text-gray-700 font-bold py-2 rounded-xl text-sm border border-gray-200 hover:bg-gray-100">$100</button>
                                        <button onClick={() => setCash(500)} className="bg-gray-50 text-gray-700 font-bold py-2 rounded-xl text-sm border border-gray-200 hover:bg-gray-100">$500</button>
                                        <button onClick={() => setCash(1000)} className="bg-gray-50 text-gray-700 font-bold py-2 rounded-xl text-sm border border-gray-200 hover:bg-gray-100">$1000</button>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        {['1','2','3','4','5','6','7','8','9'].map(num => (
                                            <button key={num} onClick={() => appendCash(num)} className="numpad-btn">{num}</button>
                                        ))}
                                        <button onClick={() => setCashReceivedStr('')} className="numpad-btn text-red-500 bg-red-50">C</button>
                                        <button onClick={() => appendCash('0')} className="numpad-btn">0</button>
                                        <button onClick={() => appendCash('00')} className="numpad-btn">00</button>
                                    </div>

                                    <button 
                                        onClick={completeOrder} 
                                        disabled={changeAmount < 0} 
                                        className={`w-full py-4 mt-2 rounded-xl font-black text-white text-lg shadow-lg transition-all flex items-center justify-center ${changeAmount < 0 ? 'bg-gray-300 shadow-none' : 'bg-green-500 hover:bg-green-600 active:scale-95'}`}
                                    >
                                        <CheckCircle className="mr-2"/> 確認完成結帳
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- DataManager ---
        const DataManager = ({ firebaseStatus, onConnectFirebase, onDisconnectFirebase, recipes, ingredients, packaging, setRecipes }) => {
            const fileInputRef = useRef(null);
            const [configInput, setConfigInput] = useState('');
            const [isWiping, setIsWiping] = useState(false);
            const [isRelinking, setIsRelinking] = useState(false);

            const handleExport = () => { const data = { recipes: JSON.parse(localStorage.getItem('baking_recipes_v3') || '[]'), ingredients: JSON.parse(localStorage.getItem('baking_ingredients_v3') || '[]'), packaging: JSON.parse(localStorage.getItem('baking_packaging_v3') || '[]'), orders: JSON.parse(localStorage.getItem('baking_orders_v3') || '[]'), stalls: JSON.parse(localStorage.getItem('baking_stalls_v3') || '[]'), timestamp: new Date().toISOString() }; const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `baking_backup_${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); };
            const handleImport = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (evt) => { try { const data = JSON.parse(evt.target.result); if (confirm(`即將匯入 ${data.timestamp} 的備份檔案。\n這將覆蓋目前的資料，確定嗎？`)) { if(data.recipes) localStorage.setItem('baking_recipes_v3', JSON.stringify(data.recipes)); if(data.ingredients) localStorage.setItem('baking_ingredients_v3', JSON.stringify(data.ingredients)); if(data.packaging) localStorage.setItem('baking_packaging_v3', JSON.stringify(data.packaging)); if(data.orders) localStorage.setItem('baking_orders_v3', JSON.stringify(data.orders)); if(data.stalls) localStorage.setItem('baking_stalls_v3', JSON.stringify(data.stalls)); alert("資料匯入成功！頁面將重新整理。"); window.location.reload(); } } catch (err) { alert("匯入失敗：檔案格式錯誤"); console.error(err); } }; reader.readAsText(file); e.target.value = ''; };
            
            const handleRelinkAll = async () => {
                if(!confirm("確定要進行「智能連結修復」嗎？\n系統將會嘗試用「名稱」將所有食譜中的食材與包材重新配對到資料庫。")) return;
                setIsRelinking(true);
                let repairedCount = 0;
                const newRecipes = (recipes||[]).map(recipe => { 
                    let changed = false;
                    const newItems = (recipe.items || []).map(item => {
                        let target = (ingredients||[]).find(i => i.id === item.id);
                        if (!target && item.name) {
                            target = (ingredients||[]).find(i => i.name.trim().toLowerCase() === item.name.trim().toLowerCase());
                            if (target) { item.id = target.id; changed = true; repairedCount++; }
                        }
                        if(target) item.name = target.name;
                        return item;
                    });
                    const newPkgItems = (recipe.packagingItems || []).map(item => {
                        let target = (packaging||[]).find(p => p.id === item.id);
                        if (!target && item.name) {
                            target = (packaging||[]).find(p => p.name.trim().toLowerCase() === item.name.trim().toLowerCase());
                            if (target) { item.id = target.id; changed = true; repairedCount++; }
                        }
                        if(target) item.name = target.name;
                        return item;
                    });
                    if (changed) return { ...recipe, items: newItems, packagingItems: newPkgItems };
                    return recipe;
                });
                setRecipes(newRecipes);
                if (firebaseStatus === 'connected') {
                    const db = firebase.firestore();
                    const batch = db.batch();
                    newRecipes.forEach(r => { const ref = db.collection('recipes').doc(r.id); batch.set(ref, r, { merge: true }); });
                    await batch.commit();
                }
                alert(`修復完成！共重新連結了 ${repairedCount} 個項目。\n請回到食譜管理檢查。`);
                setIsRelinking(false);
            };

            const handleHardReset = async () => {
                if (!confirm("⚠️ 超級警告 ⚠️\n\n這會刪除「本機」和「雲端」的所有資料。\n資料將無法復原！\n\n您確定嗎？")) return;
                setIsWiping(true);
                try {
                    if (firebaseStatus === 'connected') {
                        const db = firebase.firestore();
                        const collections = ['recipes', 'ingredients', 'packaging', 'orders', 'stalls'];
                        for (const col of collections) {
                            const snapshot = await db.collection(col).get();
                            if (!snapshot.empty) { const batch = db.batch(); snapshot.docs.forEach(doc => batch.delete(doc.ref)); await batch.commit(); }
                        }
                    }
                    localStorage.clear();
                    alert("系統已徹底重置！");
                    window.location.reload();
                } catch (e) { console.error(e); alert("重置失敗"); setIsWiping(false); }
            };

            const connectCloud = () => { try { const config = JSON.parse(configInput); onConnectFirebase(config); } catch (e) { alert("設定格式錯誤"); } };
            const forceUpload = async () => { if (firebaseStatus !== 'connected') return alert("請先連線至雲端！"); if (!confirm("確定要將本機的所有資料上傳並覆蓋雲端嗎？")) return; try { const db = firebase.firestore(); const collections = ['recipes', 'ingredients', 'packaging', 'orders', 'stalls']; const btn = document.getElementById('uploadBtn'); if(btn) btn.innerText = "上傳中..."; for (const col of collections) { const localData = JSON.parse(localStorage.getItem(`baking_${col}_v3`) || '[]'); const batch = db.batch(); for (const item of localData) { const ref = db.collection(col).doc(item.id); batch.set(ref, item, { merge: true }); } await batch.commit(); } alert(`同步成功！`); } catch (e) { console.error(e); alert("上傳發生錯誤"); } finally { const btn = document.getElementById('uploadBtn'); if(btn) btn.innerText = "☁️ 強制上傳本機資料至雲端"; } };
            
            return ( <div className="space-y-6"><h2 className="text-2xl font-bold text-gray-800 flex items-center"><Settings className="mr-2"/> 系統設定</h2><Card className="p-6 border-l-4 border-l-indigo-500"><div className="flex justify-between items-start"><div><h3 className="text-xl font-bold flex items-center text-indigo-800">{firebaseStatus === 'connected' ? <Cloud className="mr-2 text-green-500"/> : <CloudOff className="mr-2 text-gray-400"/>}雲端同步</h3><p className="text-sm text-gray-500 mt-1">狀態: {firebaseStatus === 'connected' ? <span className="text-green-600 font-bold">已連線</span> : '未連線'}</p></div>{firebaseStatus === 'connected' && (<button onClick={onDisconnectFirebase} className="px-3 py-1 border border-red-200 text-red-500 rounded hover:bg-red-50 text-sm">中斷連線</button>)}</div>{firebaseStatus === 'connected' ? (<button id="uploadBtn" onClick={forceUpload} className="mt-4 w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow hover:bg-indigo-700 flex justify-center items-center"><UploadCloud className="mr-2"/> 強制上傳本機資料至雲端</button>) : (<div className="mt-4 space-y-3"><textarea className="w-full p-3 border rounded-lg font-mono text-xs bg-gray-50 h-32 focus:ring-2 focus:ring-indigo-500" placeholder='Firebase Config JSON' value={configInput} onChange={e => setConfigInput(e.target.value)} /><button onClick={connectCloud} className="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow hover:bg-indigo-700 w-full font-bold">啟用雲端同步</button></div>)}</Card><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><Card className="p-6"><div className="flex items-center mb-4 text-gray-600"><Download className="w-6 h-6 mr-2"/><h3 className="font-bold">備份資料 (匯出)</h3></div><button onClick={handleExport} className="w-full py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">下載 .json 備份檔</button></Card><Card className="p-6"><div className="flex items-center mb-4 text-gray-600"><UploadCloud className="w-6 h-6 mr-2"/><h3 className="font-bold">還原資料 (匯入)</h3></div><input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" /><button onClick={() => fileInputRef.current.click()} className="w-full py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">選擇檔案還原</button></Card></div><div className="bg-indigo-50 p-4 rounded-lg border border-indigo-200 mt-6"><h3 className="font-bold text-indigo-800 mb-2 flex items-center"><Wrench className="mr-2"/> 進階資料修復</h3><p className="text-sm text-gray-600 mb-3">如果您發現食譜中的食材或包材消失了，請按此按鈕自動修復。</p><button onClick={handleRelinkAll} disabled={isRelinking} className="w-full py-2 bg-indigo-600 text-white font-bold rounded shadow hover:bg-indigo-700 flex justify-center items-center">{isRelinking ? '正在掃描修復中...' : '🔄 智能修復所有連結 (依名稱配對)'}</button></div><div className="border-t pt-6 mt-6 bg-red-50 p-4 rounded-lg border border-red-100"><h3 className="font-bold text-red-700 mb-2 flex items-center"><AlertCircle className="mr-2"/> 危險區域</h3><button onClick={handleHardReset} disabled={isWiping} className="w-full py-3 bg-red-600 text-white font-bold rounded shadow hover:bg-red-700 flex justify-center items-center">{isWiping ? '正在徹底銷毀資料...' : '💀 徹底重置所有資料 (含雲端)'}</button></div></div> );
        };

        // --- Dashboard ---
        const Dashboard = ({ recipes, ingredients, packaging, orders, stalls }) => {
            const [viewDetail, setViewDetail] = useState(null);
            const [dateRange, setDateRange] = useState({ start: '2024-04-30', end: new Date().toISOString().split('T')[0] });
            
            // 🔥 V118: Safe Array + Filter Nulls
            const safeIngredients = Array.isArray(ingredients) ? ingredients : [];
            const safePackaging = Array.isArray(packaging) ? packaging : [];
            const safeOrders = (Array.isArray(orders) ? orders : []).filter(o => o);
            const safeStalls = (Array.isArray(stalls) ? stalls : []).filter(s => s);
            const safeRecipes = Array.isArray(recipes) ? recipes : [];
            
            const lowStockItems = [ ...safeIngredients.filter(i => !i.parentIngredientId && i.stock < (i.lowStockThreshold || 500)), ...safePackaging.filter(p => p.stock < (p.lowStockThreshold || 20)) ];
            const pendingOrders = safeOrders.filter(o => o.status === 'pending');
            const completedOrders = safeOrders.filter(o => o.status === 'completed');
            
            const orderRevenue = completedOrders.reduce((acc, order) => acc + (order.totalAmount || 0), 0);
            const stallRevenue = safeStalls.reduce((acc, stall) => acc + (stall.totalRevenue || 0), 0);
            const financialData = useMemo(() => {
                const start = new Date(dateRange.start); const end = new Date(dateRange.end); end.setHours(23, 59, 59);
                const filteredOrders = completedOrders.filter(o => { const d = new Date(o.date); return d >= start && d <= end; });
                const filteredStalls = safeStalls.filter(s => { const d = new Date(s.startDate || s.date); return d >= start && d <= end; });
                let revenue = 0, cost = 0;
                filteredOrders.forEach(order => { revenue += (order.totalAmount || 0); cost += (order.packagingFee || 0); }); 
                filteredStalls.forEach(stall => { 
                    revenue += (stall.totalRevenue || 0); 
                    cost += (stall.totalCost || 0); 
                });
                return { revenue, cost, profit: revenue - cost };
            }, [dateRange, completedOrders, safeStalls]);
            const toggleView = (view) => setViewDetail(prev => prev === view ? null : view);
            return (
                <div className="space-y-6"><div className="grid grid-cols-2 md:grid-cols-4 gap-4"><Card className={`p-4 ${viewDetail === 'pending' ? 'ring-2 ring-blue-500' : ''}`} onClick={() => toggleView('pending')}><div className="flex items-center space-x-3"><div className="p-3 bg-blue-100 rounded-full text-blue-600"><ClipboardList size={24} /></div><div><p className="text-sm text-gray-500">待出貨</p><p className="text-2xl font-bold">{pendingOrders.length}</p></div></div></Card><Card className={`p-4 ${viewDetail === 'revenue' ? 'ring-2 ring-green-500' : ''}`} onClick={() => toggleView('revenue')}><div className="flex items-center space-x-3"><div className="p-3 bg-green-100 rounded-full text-green-600"><DollarSign size={24} /></div><div><p className="text-sm text-gray-500">總營收</p><p className="text-2xl font-bold">${(orderRevenue + stallRevenue).toLocaleString()}</p></div></div></Card><Card className="p-4"><div className="flex items-center space-x-3"><div className="p-3 bg-indigo-100 rounded-full text-indigo-600"><ChefHat size={24} /></div><div><p className="text-sm text-gray-500">食譜數</p><p className="text-2xl font-bold">{safeRecipes.length}</p></div></div></Card><Card className={`p-4 ${viewDetail === 'lowStock' ? 'ring-2 ring-yellow-500' : ''}`} onClick={() => toggleView('lowStock')}><div className="flex items-center space-x-3"><div className="p-3 bg-yellow-100 rounded-full text-yellow-600"><AlertTriangle size={24} /></div><div><p className="text-sm text-gray-500">缺貨品項</p><p className="text-2xl font-bold text-red-600">{lowStockItems.length}</p></div></div></Card></div>{viewDetail && <div className="bg-white p-4 rounded-xl shadow border border-gray-100 animate-fade-in"><h3 className="font-bold text-lg mb-4 text-gray-700">{viewDetail === 'pending' ? '待出貨清單' : viewDetail === 'revenue' ? '財務報表' : '補貨清單'}</h3><div className="flex justify-end mb-2"><button onClick={() => setViewDetail(null)} className="text-gray-400 hover:text-gray-600"><X /></button></div>{viewDetail === 'pending' && (pendingOrders.length === 0 ? <p>無</p> : <div className="space-y-2">{pendingOrders.map(o => <div key={o.id} className="flex justify-between border-b pb-2"><span>{o.customer}</span><span className="font-bold">${o.totalAmount}</span></div>)}</div>)}{viewDetail === 'revenue' && (<div><div className="flex items-center space-x-2 mb-4"><input type="date" className="border p-1 rounded" value={dateRange.start} onChange={e => setDateRange({...dateRange, start: e.target.value})} />~<input type="date" className="border p-1 rounded" value={dateRange.end} onChange={e => setDateRange({...dateRange, end: e.target.value})} /></div><div className="grid grid-cols-3 gap-4"><div className="text-center p-2 bg-green-50 rounded"><p>收入</p><p className="font-bold text-xl">${financialData.revenue.toLocaleString()}</p></div><div className="text-center p-2 bg-red-50 rounded"><p>支出(估)</p><p className="font-bold text-xl">${financialData.cost.toLocaleString()}</p></div><div className="text-center p-2 bg-indigo-50 rounded"><p>淨利</p><p className="font-bold text-xl">${financialData.profit.toLocaleString()}</p></div></div></div>)}{viewDetail === 'lowStock' && <div className="space-y-2">{lowStockItems.map(i => <div key={i.id} className="flex justify-between text-red-600"><span>{i.name}</span><span>剩 {i.stock} {i.unit}</span></div>)}</div>}</div>}</div>
            );
        };

        // --- ReportManager ---
        const ReportManager = ({ recipes, orders, stalls }) => {
            const [dateRange, setDateRange] = useState({ start: '2024-04-30', end: new Date().toISOString().split('T')[0] });
            const [reportType, setReportType] = useState('product'); 
            const [sourceFilter, setSourceFilter] = useState('all'); 
            
            const reportData = useMemo(() => {
                const start = new Date(dateRange.start); const end = new Date(dateRange.end); end.setHours(23, 59, 59);
                const aggregated = [];
                const safeRecipes = Array.isArray(recipes) ? recipes : [];
                // 🔥 V118: Filter Nulls
                const safeOrders = (Array.isArray(orders) ? orders : []).filter(o => o);
                const safeStalls = (Array.isArray(stalls) ? stalls : []).filter(s => s);
                
                if (sourceFilter === 'all' || sourceFilter === 'orders') {
                    safeOrders.forEach(o => { 
                        if (o.status !== 'completed') return; 
                        const d = new Date(o.date); if (d < start || d > end) return; 
                        (o.items||[]).forEach(item => { 
                            const r = safeRecipes.find(rec => rec.id === item.recipeId); 
                            aggregated.push({ name: r ? r.name : (item.recipeName || '未知商品'), category: r ? (r.category || '未分類') : '未知', qty: item.qty, revenue: item.qty * (item.price||0), date: d, source: 'order' }); 
                        }); 
                    });
                }
                if (sourceFilter === 'all' || sourceFilter === 'stalls') {
                    safeStalls.forEach(s => { 
                        if (s.status !== 'completed') return; 
                        const d = new Date(s.startDate || s.date); if (d < start || d > end) return; 
                        (s.products||[]).forEach(p => { 
                            const r = safeRecipes.find(rec => rec.id === p.recipeId); 
                            const realRevenue = (p.soldQty * p.price) - (p.discountAmount || 0);
                            aggregated.push({ name: r ? r.name : '未知擺攤商品', category: r ? (r.category || '未分類') : '未知', qty: p.soldQty, revenue: realRevenue, date: d, source: 'stall' }); 
                        }); 
                    });
                }
                const grouped = {};
                aggregated.forEach(item => { 
                    let key = item.name; 
                    if (reportType === 'category') key = item.category; 
                    if (reportType === 'month') key = item.date && !isNaN(item.date) ? `${item.date.getFullYear()}-${String(item.date.getMonth()+1).padStart(2, '0')}` : '未知日期'; 
                    if (reportType === 'season') { 
                        if(item.date && !isNaN(item.date)) {
                            const m = item.date.getMonth() + 1; 
                            if (m >= 3 && m <= 5) key = '春季 (3-5月)'; else if (m >= 6 && m <= 8) key = '夏季 (6-8月)'; else if (m >= 9 && m <= 11) key = '秋季 (9-11月)'; else key = '冬季 (12-2月)';
                        } else { key = '未知季節'; }
                    } 
                    if (!grouped[key]) grouped[key] = { label: key, qty: 0, revenue: 0 }; 
                    grouped[key].qty += item.qty; grouped[key].revenue += item.revenue; 
                });
                const result = Object.values(grouped).sort((a, b) => b.revenue - a.revenue);
                const totalRevenue = result.reduce((acc, cur) => acc + cur.revenue, 0);
                const pieData = result.slice(0, 6).map((item, idx) => ({ label: item.label, value: item.revenue, color: CHART_COLORS[idx % CHART_COLORS.length] })); 
                return { list: result, totalRevenue, pieData };
            }, [dateRange, reportType, sourceFilter, orders, stalls, recipes]);

            return (
                <div className="space-y-6"><div className="flex flex-col space-y-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100"><div className="flex justify-between items-center"><h2 className="text-2xl font-bold text-gray-800 flex items-center"><BarChart2 className="mr-2"/> 銷售報表中心</h2><div className="flex items-center space-x-1 bg-gray-50 px-2 py-1 rounded border"><input type="date" value={dateRange.start} onChange={e => setDateRange({...dateRange, start: e.target.value})} className="bg-transparent text-sm"/><span className="text-gray-400">~</span><input type="date" value={dateRange.end} onChange={e => setDateRange({...dateRange, end: e.target.value})} className="bg-transparent text-sm"/></div></div><div className="flex flex-wrap justify-between items-center gap-4"><div className="flex items-center bg-gray-100 rounded-lg p-1">{['product', 'category', 'month', 'season'].map(type => { const labels = { product: '商品銷售', category: '種類分析', month: '月份趨勢', season: '季節分析' }; return (<button key={type} onClick={() => setReportType(type)} className={`px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${reportType === type ? 'bg-white text-indigo-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>{labels[type]}</button>) })}</div><div className="flex items-center bg-indigo-50 rounded-lg p-1 border border-indigo-100"><button onClick={() => setSourceFilter('all')} className={`px-3 py-1.5 rounded-md text-sm font-bold flex items-center transition-colors ${sourceFilter === 'all' ? 'bg-indigo-600 text-white shadow' : 'text-indigo-600 hover:bg-indigo-100'}`}>全部收益</button><button onClick={() => setSourceFilter('orders')} className={`px-3 py-1.5 rounded-md text-sm font-bold flex items-center transition-colors ${sourceFilter === 'orders' ? 'bg-indigo-600 text-white shadow' : 'text-indigo-600 hover:bg-indigo-100'}`}><Globe size={14} className="mr-1"/>網路訂單</button><button onClick={() => setSourceFilter('stalls')} className={`px-3 py-1.5 rounded-md text-sm font-bold flex items-center transition-colors ${sourceFilter === 'stalls' ? 'bg-indigo-600 text-white shadow' : 'text-indigo-600 hover:bg-indigo-100'}`}><Store size={14} className="mr-1"/>擺攤收益</button></div></div></div><div className="grid grid-cols-1 md:grid-cols-3 gap-6"><div className="md:col-span-1 space-y-4"><Card className="p-6 bg-gradient-to-br from-indigo-500 to-purple-600 text-white border-none"><p className="text-indigo-100 text-sm font-medium mb-1">{sourceFilter === 'all' ? '總銷售額' : sourceFilter === 'orders' ? '網路訂單總額' : '擺攤總收益'}</p><p className="text-3xl font-bold">${reportData.totalRevenue.toLocaleString()}</p><div className="mt-4 flex items-center text-xs text-indigo-200"><Activity size={14} className="mr-1"/> 統計筆數: {reportData.list.length} 筆項目</div></Card><Card className="p-6"><h4 className="font-bold text-gray-700 mb-4 flex items-center"><PieChart size={18} className="mr-2"/> 營收佔比 (前6名)</h4><div className="flex justify-center mb-4"><SimplePieChart data={reportData.pieData} /></div><div className="space-y-2">{reportData.pieData.map((d, i) => (<div key={i} className="flex justify-between text-xs items-center"><div className="flex items-center"><div className="w-2 h-2 rounded-full mr-2" style={{background: d.color}}></div><span>{d.label}</span></div><span className="font-bold text-gray-600">{Math.round((d.value/reportData.totalRevenue)*100)}%</span></div>))}</div></Card></div><div className="md:col-span-2"><Card className="overflow-hidden"><div className="p-4 border-b bg-gray-50 flex justify-between items-center"><h4 className="font-bold text-gray-700">詳細銷售數據</h4></div><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-white text-gray-500 border-b"><tr><th className="p-3 w-16 text-center">排名</th><th className="p-3">項目名稱</th><th className="p-3 text-right">銷售數量</th><th className="p-3 text-right">銷售金額</th><th className="p-3 w-24">佔比</th></tr></thead><tbody className="divide-y">{reportData.list.length === 0 ? (<tr><td colSpan="5" className="p-8 text-center text-gray-400">此區間無銷售資料</td></tr>) : reportData.list.map((item, idx) => (<tr key={idx} className="hover:bg-gray-50"><td className="p-3 text-center font-bold text-gray-400">#{idx+1}</td><td className="p-3 font-medium text-gray-800">{item.label}</td><td className="p-3 text-right text-gray-600">{item.qty}</td><td className="p-3 text-right font-bold text-indigo-600">${item.revenue.toLocaleString()}</td><td className="p-3"><div className="flex items-center"><div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden mr-2"><div className="h-full bg-indigo-500" style={{width: `${(item.revenue/reportData.totalRevenue)*100}%`}}></div></div></div></td></tr>))}</tbody></table></div></Card></div></div></div>
            );
        };

        // --- RecipeManager ---
        const RecipeManager = ({ recipes, ingredients, packaging, onSave, onDelete, onClearAll }) => {
            const [editingId, setEditingId] = useState(null);
            const [recipeForm, setRecipeForm] = useState({ name: '', category: '', sellingPrice: 0, items: [], packagingItems: [], yieldCount: 1, note: '', markupPercent: 0, extraFee: 50 });
            const categories = ['蛋糕', '麵包', '餅乾', '甜點', '其他'];
            const fileInputRef = useRef(null);

            const startEdit = (recipe) => {
                setEditingId(recipe.id);
                let form = JSON.parse(JSON.stringify(recipe));
                if (form.markupPercent === undefined) form.markupPercent = 0;
                if (form.extraFee === undefined) form.extraFee = 50;
                form.items = form.items.map(item => {
                    let exists = (ingredients||[]).find(i => i.id === item.id);
                    if (!exists && item.name) {
                        const recovered = (ingredients||[]).find(i => i.name.trim().toLowerCase() === item.name.trim().toLowerCase());
                        if (recovered) { exists = recovered; item.id = recovered.id; }
                    } else if (exists) { item.name = exists.name; }
                    return item;
                });
                form.packagingItems = (form.packagingItems||[]).map(item => {
                    let exists = (packaging||[]).find(p => p.id === item.id);
                    if (!exists && item.name) {
                        const recovered = (packaging||[]).find(p => p.name.trim().toLowerCase() === item.name.trim().toLowerCase());
                        if (recovered) { exists = recovered; item.id = recovered.id; }
                    } else if (exists) { item.name = exists.name; }
                    return item;
                });
                setRecipeForm(form);
            };

            const startNew = () => {
                setEditingId('new');
                setRecipeForm({ name: '', category: '蛋糕', sellingPrice: 0, items: [], packagingItems: [], yieldCount: 1, note: '', markupPercent: 0, extraFee: 50 });
            };

            const checkRecipeHealth = (recipe) => {
                let hasError = false;
                if (recipe.items && recipe.items.length > 0) {
                    const missingIng = recipe.items.some(i => !(ingredients || []).find(ing => ing.id === i.id));
                    if (missingIng) hasError = true;
                }
                if (recipe.packagingItems && recipe.packagingItems.length > 0) {
                    const missingPkg = recipe.packagingItems.some(p => !(packaging || []).find(pkg => pkg.id === p.id));
                    if (missingPkg) hasError = true;
                }
                return hasError;
            };

            const calculateCost = (form) => {
                let totalCost = 0;
                const safeIngredients = Array.isArray(ingredients) ? ingredients : [];
                const safePackaging = Array.isArray(packaging) ? packaging : [];
                (form.items || []).forEach(item => {
                    const ing = safeIngredients.find(i => i.id === item.id) || safeIngredients.find(i => i.name === item.name);
                    if (ing) { const costPerUnit = ing.cost || 0; totalCost += costPerUnit * item.qty; }
                });
                (form.packagingItems || []).forEach(item => {
                    const pkg = safePackaging.find(p => p.id === item.id) || safePackaging.find(p => p.name === item.name);
                    if (pkg) { const costPerUnit = pkg.cost || 0; totalCost += costPerUnit * item.qty; }
                });
                return totalCost / (parseFloat(form.yieldCount) || 1);
            };

            const calculateNutrition = (form) => {
                const total = NUTRIENTS.reduce((acc, curr) => ({...acc, [curr.key]: 0}), {});
                let hasData = false;
                const safeIngredients = Array.isArray(ingredients) ? ingredients : [];
                (form.items || []).forEach(item => {
                    const ing = safeIngredients.find(i => i.id === item.id) || safeIngredients.find(i => i.name === item.name);
                    if (ing && ing.nutrition) {
                        hasData = true;
                        const factor = item.qty / 100;
                        NUTRIENTS.forEach(nut => { total[nut.key] += (ing.nutrition[nut.key] || 0) * factor; });
                    }
                });
                const yieldCount = parseFloat(form.yieldCount) || 1;
                const perServing = NUTRIENTS.reduce((acc, curr) => ({ ...acc, [curr.key]: total[curr.key] / yieldCount }), {});
                return { total, perServing, hasData };
            };

            const handleImportClick = () => fileInputRef.current.click();
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = window.XLSX.read(data, { type: 'array' });
                    const jsonData = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    processExcelData(jsonData);
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            const processExcelData = (rows) => {
                let successCount = 0;
                let failLog = [];
                const safeIngredients = Array.isArray(ingredients) ? ingredients : [];
                const safePackaging = Array.isArray(packaging) ? packaging : [];
                
                rows.forEach((row, idx) => {
                    const name = row['名稱'] || row['食譜名稱'];
                    if (!name) return;
                    
                    const newItem = { 
                        id: generateUniqueId(), 
                        name: name, 
                        category: row['分類'] || '其他', 
                        sellingPrice: parseFloat(row['售價'] || 0), 
                        yieldCount: parseFloat(row['產出份數'] || 1), 
                        note: row['備註'] || '', 
                        markupPercent: parseFloat(row['成本模式'] || 0),
                        extraFee: 50,
                        items: [], 
                        packagingItems: [] 
                    };

                    const ingStr = row['食材列表'] || row['食材'];
                    if (ingStr) {
                        const parts = ingStr.toString().split(/[,，]/);
                        parts.forEach(p => {
                            const [iName, iQty] = p.split(/[:：]/);
                            if (iName && iQty) {
                                const cleanName = iName.trim();
                                const targetIng = safeIngredients.find(i => i.name.trim().toLowerCase() === cleanName.toLowerCase());
                                if (!targetIng) failLog.push(`食譜[${name}]: 找不到食材 "${cleanName}"`);
                                newItem.items.push({ id: targetIng ? targetIng.id : generateUniqueId(), name: cleanName, qty: parseFloat(iQty) });
                            }
                        });
                    }
                    const pkgStr = row['包材列表'] || row['包材'];
                    if (pkgStr) {
                        const parts = pkgStr.toString().split(/[,，]/);
                        parts.forEach(p => {
                            const [pName, pQty] = p.split(/[:：]/);
                            if (pName && pQty) {
                                const cleanName = pName.trim();
                                const targetPkg = safePackaging.find(pkg => pkg.name.trim().toLowerCase() === cleanName.toLowerCase());
                                if (!targetPkg) failLog.push(`食譜[${name}]: 找不到包材 "${cleanName}"`);
                                newItem.packagingItems.push({ id: targetPkg ? targetPkg.id : generateUniqueId(), name: cleanName, qty: parseFloat(pQty) });
                            }
                        });
                    }
                    onSave(newItem);
                    successCount++;
                });
                let msg = `成功匯入 ${successCount} 筆食譜！(已套用成本模式設定)`;
                if (failLog.length > 0) { msg += `\n\n⚠️ 注意：有 ${failLog.length} 個項目連結失敗 (請檢查名稱是否完全一致)：\n` + failLog.slice(0, 5).join('\n') + (failLog.length > 5 ? '\n...' : ''); }
                alert(msg);
            };

            const save = () => { if (!recipeForm.name) return alert('請輸入名稱'); onSave(recipeForm, editingId === 'new' ? null : editingId); setEditingId(null); };

            const confirmClearAll = () => {
                if(confirm("確定要【清空】所有食譜嗎？\n\n這通常用於：想要重新匯入一份全新的 Excel 食譜表。\n此操作無法復原！")) {
                    onClearAll();
                }
            };

            if (editingId) {
                const currentCost = calculateCost(recipeForm);
                const profit = (parseFloat(recipeForm.sellingPrice) || 0) - currentCost;
                const margin = (parseFloat(recipeForm.sellingPrice) || 0) > 0 ? (profit / recipeForm.sellingPrice) * 100 : 0;
                const nutritionData = calculateNutrition(recipeForm);

                return (
                    <Modal title={editingId === 'new' ? '新增食譜' : '編輯食譜'} onClose={() => setEditingId(null)}>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="space-y-4">
                                <div><label className="text-xs text-gray-500">食譜名稱</label><input className="w-full border p-2 rounded" value={recipeForm.name} onChange={e => setRecipeForm({ ...recipeForm, name: e.target.value })} /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="text-xs text-gray-500">分類</label><select className="w-full border p-2 rounded" value={recipeForm.category} onChange={e => setRecipeForm({ ...recipeForm, category: e.target.value })}>{categories.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    <div><label className="text-xs text-gray-500">販售價格 ($)</label><SafeNumberInput className="w-full border p-2 rounded font-bold text-indigo-700" value={recipeForm.sellingPrice} onChange={v => setRecipeForm({ ...recipeForm, sellingPrice: v })} /></div>
                                </div>
                                <div><label className="text-xs text-gray-500">預計產出數量 (份)</label><SafeNumberInput className="w-full border p-2 rounded" value={recipeForm.yieldCount} onChange={v => setRecipeForm({ ...recipeForm, yieldCount: v })} /></div>
                                
                                <div className="bg-gray-50 p-4 rounded-lg space-y-3 border border-gray-200">
                                    <div className="flex justify-between text-sm items-center"><span className="text-gray-500">單份成本:</span><span className="font-bold text-red-600 text-lg">${currentCost.toFixed(1)}</span></div>
                                    <div className="flex justify-between items-center bg-blue-50 p-2 rounded border border-blue-100 flex-wrap gap-2">
                                        <div className="flex items-center space-x-1"><span className="text-sm text-blue-700 font-bold">成本 x (1 +</span><input type="number" className="w-14 border border-blue-300 rounded p-1 text-center text-sm font-bold shadow-sm focus:ring-2 focus:ring-blue-400" value={recipeForm.markupPercent} onChange={(e) => { const m = parseFloat(e.target.value) || 0; const fee = parseFloat(recipeForm.extraFee) || 0; const newPrice = Math.ceil(currentCost * (1 + m/100) + fee); setRecipeForm({...recipeForm, markupPercent: m, sellingPrice: newPrice}); }} /><span className="text-sm text-blue-700 font-bold">%)</span></div>
                                        <div className="flex items-center space-x-1"><span className="text-sm text-blue-700 font-bold">+ 工錢</span><input type="number" className="w-14 border border-blue-300 rounded p-1 text-center text-sm font-bold shadow-sm focus:ring-2 focus:ring-blue-400" value={recipeForm.extraFee} onChange={(e) => { const m = parseFloat(recipeForm.markupPercent) || 0; const fee = parseFloat(e.target.value) || 0; const newPrice = Math.ceil(currentCost * (1 + m/100) + fee); setRecipeForm({...recipeForm, extraFee: fee, sellingPrice: newPrice}); }} /></div>
                                        <div className="w-full text-right text-xs text-blue-500">= 建議售價 ${Math.ceil(currentCost * (1 + (recipeForm.markupPercent||0)/100) + (recipeForm.extraFee||0))}</div>
                                    </div>
                                    <div className="flex justify-between text-sm pt-2 border-t border-gray-200"><span>單份毛利:</span><span className={`font-bold ${profit > 0 ? 'text-green-600' : 'text-red-600'}`}>${profit.toFixed(1)}</span></div>
                                    <div className="flex justify-between text-sm"><span>毛利率:</span><span className={`font-bold ${margin >= 30 ? 'text-green-600' : 'text-orange-500'}`}>{margin.toFixed(1)}%</span></div>
                                </div>

                                <div className="bg-green-50 p-4 rounded-lg border border-green-200">
                                    <h4 className="font-bold text-green-800 mb-2 flex items-center"><Leaf size={16} className="mr-2"/> 營養標示 (每份)</h4>
                                    {!nutritionData.hasData ? (<p className="text-xs text-gray-500">尚無數據 (請確保食材已設定營養成分)</p>) : (<div className="grid grid-cols-2 gap-y-1 gap-x-4 text-xs">{NUTRIENTS.map(nut => (<div key={nut.key} className="flex justify-between border-b border-green-100 pb-1"><span className="text-gray-600">{nut.label}</span><span className="font-bold text-green-700">{nutritionData.perServing[nut.key].toFixed(1)} {nut.unit}</span></div>))}</div>)}
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                                    <div className="flex justify-between mb-2"><h4 className="font-bold text-sm text-indigo-800">所需食材 (總量)</h4><button onClick={() => setRecipeForm({ ...recipeForm, items: [...recipeForm.items, { id: ingredients[0]?.id || '', qty: 0 }] })} className="text-xs bg-white border border-indigo-200 px-2 py-1 rounded text-indigo-600">+ 加入</button></div>
                                    <div className="max-h-60 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
                                        {recipeForm.items.map((item, idx) => {
                                            const ing = (ingredients||[]).find(i => i.id === item.id) || (ingredients||[]).find(i => i.name === item.name);
                                            const itemCost = ing ? (ing.cost * item.qty) : 0;
                                            return (
                                            <div key={idx} className={`flex flex-col p-2 rounded border mb-1 ${!ing ? 'bg-red-50 border-red-200' : 'bg-white border-indigo-100'}`}>
                                                <div className="flex items-center space-x-1 mb-1">
                                                    <select className={`flex-1 text-xs p-1 border rounded ${!ing ? 'border-red-500 bg-red-50' : ''}`} value={item.id} onChange={e => { const n = [...recipeForm.items]; const selectedIng = ingredients.find(i => i.id === e.target.value); n[idx].id = e.target.value; n[idx].name = selectedIng ? selectedIng.name : ''; setRecipeForm({ ...recipeForm, items: n }) }}>
                                                        {!ing && <option value={item.id}>❌ {item.name || '未知'} (連結失效)</option>}
                                                        {(ingredients||[]).map(i => <option key={i.id} value={i.id}>{i.name} (${(i.cost||0).toFixed(2)}/{i.unit})</option>)}
                                                    </select>
                                                    <input type="number" className="w-16 text-xs p-1 border rounded" placeholder="量" value={item.qty} onChange={e => { const n = [...recipeForm.items]; n[idx].qty = parseFloat(e.target.value) || 0; setRecipeForm({ ...recipeForm, items: n }) }} />
                                                    <button onClick={() => { const n = recipeForm.items.filter((_, i) => i !== idx); setRecipeForm({ ...recipeForm, items: n }) }} className="text-red-400"><X size={14} /></button>
                                                </div>
                                                <div className="text-[10px] text-gray-500 flex justify-between"><span>單價: ${ing ? ing.cost.toFixed(4) : 0} x {item.qty}</span><span className="font-bold text-indigo-600">= ${itemCost.toFixed(2)}</span></div>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                                <div className="bg-yellow-50 p-3 rounded-lg border border-yellow-100">
                                    <div className="flex justify-between mb-2"><h4 className="font-bold text-sm text-yellow-800">所需包材 (總量)</h4><button onClick={() => setRecipeForm({ ...recipeForm, packagingItems: [...(recipeForm.packagingItems || []), { id: packaging[0]?.id || '', qty: 0 }] })} className="text-xs bg-white border border-yellow-200 px-2 py-1 rounded text-yellow-600">+ 加入</button></div>
                                    <div className="max-h-40 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
                                        {recipeForm.packagingItems && recipeForm.packagingItems.map((item, idx) => {
                                            const pkg = (packaging||[]).find(p => p.id === item.id) || (packaging||[]).find(p => p.name === item.name);
                                            return (
                                            <div key={idx} className={`flex items-center space-x-1 mb-1 p-1 rounded border ${!pkg ? 'bg-red-50 border-red-200' : 'bg-white'}`}>
                                                <select className={`flex-1 text-xs p-1 border rounded ${!pkg ? 'border-red-500 bg-red-50' : ''}`} value={item.id} onChange={e => { const n = [...recipeForm.packagingItems]; const p = packaging.find(px=>px.id===e.target.value); n[idx].id = e.target.value; n[idx].name = p?p.name:''; setRecipeForm({ ...recipeForm, packagingItems: n }) }}>
                                                    {!pkg && <option value={item.id}>❌ {item.name || '未知'} (連結失效)</option>}
                                                    {(packaging||[]).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                                </select>
                                                <input type="number" className="w-16 text-xs p-1 border rounded" placeholder="量" value={item.qty} onChange={e => { const n = [...recipeForm.packagingItems]; n[idx].qty = parseFloat(e.target.value) || 0; setRecipeForm({ ...recipeForm, packagingItems: n }) }} />
                                                <button onClick={() => { const n = recipeForm.packagingItems.filter((_, i) => i !== idx); setRecipeForm({ ...recipeForm, packagingItems: n }) }} className="text-red-400"><X size={14} /></button>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="flex justify-end space-x-2 mt-6 pt-4 border-t">
                            <button onClick={() => setEditingId(null)} className="px-4 py-2 bg-gray-200 rounded">取消</button>
                            <button onClick={save} className="px-4 py-2 bg-indigo-600 text-white rounded shadow">儲存食譜</button>
                        </div>
                    </Modal>
                );
            }

            return (
                <div className="space-y-4">
                    <div className="flex flex-col md:flex-row justify-between items-center space-y-2 md:space-y-0">
                        <h2 className="text-2xl font-bold text-gray-800">食譜管理</h2>
                        <div className="flex space-x-2">
                             <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx, .xls" className="hidden" />
                             <button onClick={handleImportClick} className="bg-green-600 text-white px-4 py-2 rounded shadow flex items-center hover:bg-green-700 text-sm"><Upload size={16} className="mr-1" /> 匯入 Excel</button>
                             {recipes.length > 0 && <button onClick={confirmClearAll} className="bg-red-500 text-white px-3 py-2 rounded shadow flex items-center hover:bg-red-600 text-sm"><Trash2 size={16} className="mr-1" /> 清空</button>}
                             <button onClick={startNew} className="bg-indigo-600 text-white px-4 py-2 rounded shadow flex items-center hover:bg-indigo-700 text-sm"><Plus size={16} className="mr-1" /> 新增</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {(recipes||[]).map(recipe => {
                            const cost = calculateCost(recipe);
                            const profit = recipe.sellingPrice - cost;
                            const isBroken = checkRecipeHealth(recipe);

                            return (
                                <Card key={recipe.id} className="p-4 flex flex-col justify-between group">
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-lg text-gray-800 flex items-center">
                                                {isBroken && <AlertCircle size={18} className="text-red-500 mr-1 animate-pulse" title="連結失效：請檢查食材或包材是否在庫存中"/>}
                                                {recipe.name}
                                            </h3>
                                            <Badge color="indigo">{recipe.category}</Badge>
                                        </div>
                                        <div className="space-y-1 text-sm text-gray-600 mb-4">
                                            <div className="flex justify-between"><span>售價:</span><span className="font-bold text-gray-900">${recipe.sellingPrice}</span></div>
                                            <div className="flex justify-between"><span>成本(估):</span><span>${cost.toFixed(1)}</span></div>
                                            <div className="flex justify-between pt-1 border-t border-dashed"><span>預估毛利:</span><span className={profit > 0 ? 'text-green-600 font-bold' : 'text-red-500 font-bold'}>${profit.toFixed(1)}</span></div>
                                            {recipe.markupPercent > 0 && <div className="text-xs bg-blue-50 text-blue-600 px-1 rounded inline-block mt-1">成本 x (1+{recipe.markupPercent}%)</div>}
                                        </div>
                                    </div>
                                    <div className="flex space-x-2 mt-auto">
                                        <button onClick={() => startEdit(recipe)} className={`flex-1 py-1.5 rounded text-sm flex justify-center items-center ${isBroken ? 'bg-red-50 text-red-600 border border-red-200' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}><Edit3 size={14} className="mr-1" /> {isBroken ? '修復連結' : '編輯'}</button>
                                        <button onClick={() => onDelete(recipe.id)} className="px-3 bg-red-50 text-red-500 rounded border border-red-200 hover:bg-red-100 flex items-center justify-center">
                                            <Trash2 size={16} color="#ef4444" className="mr-1"/> <span className="text-red-500 text-xs font-bold">刪除</span>
                                        </button>
                                    </div>
                                </Card>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // --- OrderManager ---
        const OrderManager = ({ orders, recipes, ingredients, packaging, onSave, onDelete, onUpdateStatus }) => {
            const [activeView, setActiveView] = useState('list'); 
            const [isCreating, setIsCreating] = useState(false);
            const [newOrder, setNewOrder] = useState({ customer: '', store: '', shippingFee: 0, packagingFee: 0, items: [], note: '' });
            const [searchTerm, setSearchTerm] = useState('');
            const [previewOrders, setPreviewOrders] = useState([]);
            const [showImportPreview, setShowImportPreview] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const fileInputRef = useRef(null);

            const safeOrders = useMemo(() => Array.isArray(orders) ? orders : [], [orders]);
            const safeRecipes = useMemo(() => Array.isArray(recipes) ? recipes : [], [recipes]);
